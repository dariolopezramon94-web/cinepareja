<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CinePareja · Dashboard Cinéfilo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: #060C1A; color: #F8FAFC; padding: 1.2rem; min-height: 100vh;
            background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(109,40,217,0.12), transparent),
                              radial-gradient(ellipse 60% 40% at 90% 80%, rgba(6,182,212,0.06), transparent); }
        .app-container { max-width: 1440px; margin: 0 auto; }

        /* ── TOP BAR ── */
        .top-bar { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;
            background: rgba(10,15,35,0.8); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            padding:0.55rem 1.4rem; border-radius:2rem; border:1px solid rgba(99,179,237,0.1);
            margin-bottom:1.5rem; box-shadow:0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04); }
        .logo h1 { font-size:1.4rem; background:linear-gradient(135deg,#6D28D9,#A855F7,#06B6D4);
            -webkit-background-clip:text; background-clip:text; color:transparent; font-weight:800; letter-spacing:-0.5px; }
        .user-info { display:flex; align-items:center; gap:0.7rem; background:rgba(15,20,45,0.7);
            padding:0.22rem 0.9rem; border-radius:2rem; font-size:0.72rem; font-weight:500; color:#64748B;
            border:1px solid rgba(45,58,94,0.6); }

        /* ── BUTTONS ── */
        button { background:rgba(30,41,70,0.8); border:1px solid rgba(45,58,94,0.7); color:#94A3B8;
            padding:0.3rem 0.8rem; border-radius:2rem; cursor:pointer; font-weight:500;
            transition:all 0.2s ease; font-size:0.75rem; }
        button:hover { border-color:rgba(6,182,212,0.4); color:#E2E8F0; }
        button.primary { background:linear-gradient(115deg,#6D28D9,#8B5CF6); border:none;
            box-shadow:0 2px 12px rgba(109,40,217,0.35); color:#fff; }
        button.primary:hover { box-shadow:0 4px 20px rgba(109,40,217,0.5); transform:translateY(-1px); }
        button.outline { background:transparent; border:1px solid rgba(6,182,212,0.4); color:#06B6D4; }
        button.outline:hover { background:rgba(6,182,212,0.1); }
        button.small { padding:0.18rem 0.55rem; font-size:0.68rem; }

        /* ── TABS ── */
        .tabs { display:flex; gap:0.35rem; margin-bottom:1.4rem;
            background:rgba(10,15,35,0.6); padding:0.3rem; border-radius:1rem;
            border:1px solid rgba(30,41,70,0.8); width:fit-content; backdrop-filter:blur(12px); }
        .tab-btn { background:transparent; border:none; padding:0.35rem 1.1rem; border-radius:0.7rem;
            font-size:0.8rem; font-weight:600; color:#475569; transition:all 0.2s; }
        .tab-btn:hover { color:#94A3B8; background:rgba(30,41,70,0.5); }
        .tab-btn.active { background:linear-gradient(115deg,rgba(109,40,217,0.8),rgba(139,92,246,0.7));
            color:#F8FAFC; box-shadow:0 2px 10px rgba(109,40,217,0.3); }

        /* ── PANEL ── */
        .panel { display:none; animation:fade 0.25s ease; }
        .panel.active-panel { display:block; }
        @keyframes fade { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

        /* ── LAYOUT ── */
        .two-columns { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-bottom:1.5rem; }
        .section-title { font-size:0.72rem; font-weight:700; margin-bottom:0.8rem; text-align:center;
            text-transform:uppercase; letter-spacing:0.12em;
            background:linear-gradient(90deg,#06B6D4,#8B5CF6); -webkit-background-clip:text; background-clip:text; color:transparent; }

        /* ── CAROUSEL ── */
        .carousel-wrapper { position:relative; overflow:visible; background:rgba(10,15,35,0.6);
            border-radius:1.1rem; padding:0.5rem 0; border:1px solid rgba(30,41,70,0.8);
            margin-top:0.5rem; min-height:380px; display:flex; flex-direction:column; justify-content:center;
            backdrop-filter:blur(8px); }
        .carousel-track-3 { display:flex; justify-content:center; overflow:visible; }
        .carousel-slide-3 { flex:0 0 33.33%; position:relative; transition:all 0.3s ease; z-index:1; }
        .carousel-slide-3:first-child { margin-right:-10%; z-index:1; }
        .carousel-slide-3:last-child  { margin-left:-10%; z-index:1; }
        .carousel-slide-3:nth-child(2) { z-index:3; }
        .carousel-slide-3.blurred .card { filter:blur(3px); opacity:0.5; }
        .carousel-slide-3:not(.blurred) .card { filter:none; opacity:1; transform:scale(1.03); box-shadow:0 12px 28px rgba(0,0,0,0.5); }
        .carousel-controls { display:flex; justify-content:center; gap:0.5rem; margin-top:0.8rem; margin-bottom:0.5rem; }
        .carousel-controls button { background:rgba(15,20,45,0.8); border:1px solid rgba(45,58,94,0.7);
            border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center;
            cursor:pointer; color:#06B6D4; font-size:1.1rem; }
        .carousel-controls button:hover { background:rgba(109,40,217,0.6); border-color:#6D28D9; color:#fff; }

        /* ── MOVIE CARD (carousel) ── */
        .card { background:rgba(12,18,42,0.95); border-radius:0.8rem; overflow:hidden; transition:all 0.25s;
            border:1px solid rgba(30,41,70,0.9); cursor:pointer; max-width:180px; margin:0 auto; }
        .card:hover { transform:translateY(-4px); border-color:rgba(109,40,217,0.5); box-shadow:0 8px 24px rgba(109,40,217,0.2); }
        .card-poster { width:100%; aspect-ratio:9/16; object-fit:cover; background:#0D1526; }
        .card-info { padding:0.4rem; }
        .card-title { font-size:0.63rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#E2E8F0; }
        .card-year { font-size:0.53rem; color:#334155; margin:0.08rem 0; }
        .card-rating { font-size:0.58rem; color:#F59E0B; font-weight:600; }
        .card-actions { display:flex; gap:0.25rem; margin-top:0.2rem; }
        .card-actions button { background:transparent; border:1px solid rgba(6,182,212,0.3); color:#06B6D4;
            font-size:0.52rem; padding:0.12rem 0; border-radius:0.6rem; width:50%; text-align:center; cursor:pointer; }
        .card-actions button:hover { background:rgba(6,182,212,0.15); }
        .wishlist-btn { width:100%; background:transparent; border:1px solid rgba(6,182,212,0.3); color:#06B6D4;
            font-size:0.52rem; margin-top:0.15rem; padding:0.12rem; border-radius:0.6rem; cursor:pointer; }
        .wishlist-btn:hover { background:rgba(6,182,212,0.15); }
        .random-btn-container { width:100%; margin-top:0.5rem; padding:0 0.5rem; }
        .random-btn { width:100%; background:transparent; border:1px solid rgba(6,182,212,0.35); color:#06B6D4;
            font-size:0.72rem; padding:0.35rem 0; border-radius:2rem; cursor:pointer; transition:all 0.2s; }
        .random-btn:hover { background:rgba(6,182,212,0.12); box-shadow:0 0 16px rgba(6,182,212,0.2); }
        .explanation { font-size:0.5rem; color:#334155; margin-top:0.2rem; line-height:1.3; }

        /* ── SCORECARDS ── */
        .scorecards-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(145px,1fr)); gap:0.7rem; margin-bottom:1.2rem; }
        .scorecard { background:linear-gradient(145deg,rgba(10,15,36,0.92),rgba(18,28,62,0.85));
            border-radius:1rem; padding:0.9rem 0.8rem 0.85rem; text-align:center;
            border:1px solid rgba(30,41,70,0.9); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
            box-shadow:0 2px 16px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
            position:relative; overflow:hidden; transition:all 0.25s; }
        .scorecard::before { content:''; position:absolute; top:0; left:15%; right:15%; height:1px;
            background:linear-gradient(90deg,transparent,rgba(6,182,212,0.4),transparent); }
        .scorecard:hover { border-color:rgba(6,182,212,0.25); box-shadow:0 4px 24px rgba(0,0,0,0.5), 0 0 20px rgba(6,182,212,0.08); transform:translateY(-1px); }
        .scorecard h3 { font-size:0.6rem; font-weight:700; margin-bottom:0.35rem; letter-spacing:0.13em; text-transform:uppercase; background:linear-gradient(90deg,#06B6D4,#8B5CF6); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .scorecard .value { font-size:1.5rem; font-weight:800; background:linear-gradient(135deg,#06B6D4,#8B5CF6);
            -webkit-background-clip:text; background-clip:text; color:transparent; line-height:1.15; }
        .scorecard .unit { font-size:0.6rem; color:#1E293B; margin-top:0.15rem; }
        .gauge-container { position:relative; width:120px; height:70px; margin:0 auto; overflow:hidden; }

        /* ── CHART CARDS ── */
        .charts-grid-dashboard { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:1rem; }
        .chart-card-dashboard { background:linear-gradient(165deg,rgba(8,12,30,0.96),rgba(14,22,52,0.9));
            border-radius:1rem; padding:0.85rem 0.85rem 0.8rem;
            border:1px solid rgba(20,30,60,0.95); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            box-shadow:0 2px 20px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.03);
            position:relative; overflow:hidden; transition:border 0.25s, box-shadow 0.25s; }
        .chart-card-dashboard::before { content:''; position:absolute; top:0; left:20%; right:20%; height:1px;
            background:linear-gradient(90deg,transparent,rgba(109,40,217,0.45),transparent); }
        .chart-card-dashboard:hover { border-color:rgba(45,58,94,0.8); box-shadow:0 4px 28px rgba(0,0,0,0.55); }
        .chart-card-dashboard h3 { font-size:0.63rem; font-weight:700; margin-bottom:0.65rem; text-align:center;
            text-transform:uppercase; letter-spacing:0.13em;
            background:linear-gradient(90deg,#06B6D4,#8B5CF6); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .chart-container { position:relative; width:100%; height:180px; }

        /* ── HEATMAP ── */
        .heatmap-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:0.35rem; margin-top:0.5rem; }
        .heatmap-cell { background:rgba(20,30,60,0.6); border-radius:0.4rem; text-align:center;
            padding:0.38rem 0.1rem; font-size:0.62rem; font-weight:700; color:#F1F5F9;
            border:1px solid rgba(20,30,60,0.8); transition:box-shadow 0.2s; }
        .weekday-label { font-size:0.52rem; color:#334155; margin-bottom:0.18rem; letter-spacing:0.04em; text-transform:uppercase; }

        /* ── BUBBLES ── */
        .bubble-container { display:flex; flex-wrap:wrap; justify-content:center; gap:0.55rem; margin-top:0.4rem; padding:0.2rem; }
        .bubble { border-radius:50%; display:flex; align-items:center; justify-content:center; color:white;
            font-size:0.58rem; font-weight:700; text-align:center; padding:0.4rem;
            border:1px solid rgba(139,92,246,0.35); box-shadow:0 0 10px rgba(109,40,217,0.3);
            cursor:default; transition:transform 0.2s, box-shadow 0.2s; }
        .bubble:hover { transform:scale(1.12); }

        /* ── BATTLE BARS ── */
        .battle-bar { display:flex; align-items:center; gap:0.55rem; margin:0.38rem 0; }
        .battle-label { width:62px; font-size:0.6rem; color:#475569; flex-shrink:0; }
        .battle-bar-fill { height:15px; border-radius:2rem; display:flex; align-items:center; justify-content:flex-end;
            padding-right:0.45rem; color:rgba(255,255,255,0.9); font-size:0.58rem; font-weight:700;
            position:relative; overflow:hidden; min-width:22px; }
        .battle-bar-fill::after { content:''; position:absolute; top:0; left:0; right:0; height:40%;
            background:rgba(255,255,255,0.08); border-radius:2rem 2rem 0 0; }

        /* ── DRAMA ── */
        .drama-meter { background:linear-gradient(90deg,#10B981,#F59E0B,#EF4444); height:13px;
            border-radius:2rem; margin:0.9rem 0 0.4rem; position:relative;
            box-shadow:0 0 12px rgba(245,158,11,0.2), inset 0 1px 0 rgba(255,255,255,0.1); }
        .drama-marker { position:absolute; top:-19px; transform:translateX(-50%); font-size:0.58rem;
            white-space:nowrap; color:#F8FAFC; background:rgba(8,12,30,0.92); padding:0.08rem 0.3rem;
            border-radius:1rem; border:1px solid rgba(255,255,255,0.07); }

        /* ── SESSION BTNS ── */
        .session-selector { display:flex; gap:0.45rem; justify-content:center; flex-wrap:wrap; margin-top:0.7rem; }
        .session-btn { background:linear-gradient(135deg,rgba(12,18,42,0.9),rgba(20,32,72,0.7));
            border:1px solid rgba(30,41,70,0.8); border-radius:2rem; padding:0.28rem 0.75rem;
            font-size:0.62rem; font-weight:600; cursor:pointer; color:#475569; transition:all 0.2s; }
        .session-btn:hover { color:#E2E8F0; border-color:rgba(6,182,212,0.35); }

        /* ── LIBRARY / WISHLIST ── */
        .library-table-wrapper { overflow-x:auto; border-radius:1rem; background:rgba(10,15,35,0.8); margin-top:0.5rem; }
        .library-table { width:100%; border-collapse:collapse; font-size:0.72rem; min-width:700px; }
        .library-table th, .library-table td { border-bottom:1px solid rgba(20,30,60,0.8); padding:0.65rem 0.4rem; text-align:center; vertical-align:middle; }
        .library-table th { background:rgba(10,15,35,0.9); font-weight:600; color:#334155; position:relative; user-select:none; letter-spacing:0.05em; text-transform:uppercase; font-size:0.6rem; }
        .resizer { position:absolute; top:0; right:0; width:5px; height:100%; cursor:col-resize; background:transparent; z-index:1; }
        .resizer:hover { background:rgba(6,182,212,0.4); }
        .library-table td img { width:48px; height:68px; object-fit:cover; border-radius:0.4rem; }
        .poster-placeholder-small { width:48px; height:68px; background:rgba(20,30,60,0.8); display:inline-flex; align-items:center; justify-content:center; border-radius:0.4rem; color:#334155; }
        .rating-value { cursor:pointer; font-weight:700; background:rgba(15,20,45,0.8); padding:0.18rem 0.4rem; border-radius:0.7rem; display:inline-flex; align-items:center; gap:2px; min-width:52px; justify-content:center; transition:all 0.15s; color:#94A3B8; border:1px solid rgba(30,41,70,0.8); font-size:0.68rem; }
        .rating-value:hover { background:rgba(109,40,217,0.3); border-color:rgba(109,40,217,0.5); color:#E2E8F0; }
        .comment-text { font-size:0.68rem; color:#334155; max-width:180px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .actions-cell { display:flex; gap:0.4rem; justify-content:center; flex-wrap:wrap; }
        .actions-cell button { background:transparent; border:none; color:#334155; padding:0.18rem 0.28rem; font-size:0.68rem; cursor:pointer; }
        .actions-cell button:hover { color:#06B6D4; }
        .sort-control { display:flex; justify-content:flex-end; margin-bottom:1rem; gap:0.5rem; align-items:center; }
        .clickable-row { cursor:pointer; transition:background 0.12s; }
        .clickable-row:hover { background:rgba(20,30,60,0.5); }

        /* ── MODAL ── */
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.88);
            display:flex; align-items:center; justify-content:center; z-index:2000; backdrop-filter:blur(10px); }
        .modal-content { background:linear-gradient(165deg,rgba(10,15,36,0.98),rgba(16,24,56,0.96));
            padding:1.5rem; border-radius:1.4rem; width:90%; max-width:550px;
            border:1px solid rgba(109,40,217,0.3); max-height:90vh; overflow-y:auto; color:#F8FAFC;
            box-shadow:0 8px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03); }
        .hidden { display:none; }

        /* ── FORM ELEMENTS ── */
        input, select, textarea { background:rgba(8,12,30,0.9); border:1px solid rgba(30,41,70,0.9);
            padding:0.45rem 0.6rem; border-radius:0.7rem; color:#E2E8F0; width:100%; margin-bottom:0.7rem;
            font-size:16px; outline:none; transition:border 0.2s; -webkit-text-size-adjust:100%; }
        input:focus, select:focus, textarea:focus { border-color:rgba(109,40,217,0.5); box-shadow:0 0 0 2px rgba(109,40,217,0.1); }
        .search-results { background:rgba(10,15,35,0.95); border-radius:0.7rem; margin-bottom:0.7rem; max-height:160px; overflow-y:auto; border:1px solid rgba(30,41,70,0.8); }
        .search-result-item { padding:0.4rem 0.6rem; cursor:pointer; border-bottom:1px solid rgba(20,30,60,0.6); font-size:0.75rem; transition:background 0.12s; color:#94A3B8; display:flex; justify-content:space-between; align-items:center; }
        .search-result-item:hover { background:rgba(109,40,217,0.25); color:#E2E8F0; }
        .flex-buttons { display:flex; gap:0.6rem; justify-content:flex-end; margin-top:0.8rem; }

        /* ── DETAIL / SUMMARY ── */
        .detail-row { display:flex; justify-content:space-between; margin-bottom:0.45rem; font-size:0.78rem; color:#E2E8F0; }
        .compact-summary { display:flex; gap:1rem; align-items:flex-start; margin-bottom:1rem; }
        .compact-summary img { width:80px; height:112px; object-fit:cover; border-radius:0.6rem; border:1px solid rgba(109,40,217,0.35); }

        /* ── PROFILE ── */
        .profile-selector { text-align:center; padding:2.5rem 2rem; background:linear-gradient(145deg,rgba(10,15,36,0.95),rgba(16,24,56,0.9));
            border-radius:1.5rem; max-width:420px; margin:3rem auto; border:1px solid rgba(109,40,217,0.3);
            box-shadow:0 8px 40px rgba(0,0,0,0.5); }
        .profile-btn { margin:0.5rem; padding:0.75rem 1.5rem; font-size:0.9rem; min-width:140px; }
        .question-label { font-weight:600; margin-bottom:0.3rem; display:block; font-size:0.75rem; color:#06B6D4; letter-spacing:0.04em; }

        /* ── PROGRESS ── */
        .progress-bar-container { width:100%; background:rgba(20,30,60,0.6); border-radius:1rem; overflow:hidden; margin:0.18rem 0; height:5px; }
        .progress-bar-fill { height:5px; background:linear-gradient(90deg,#6D28D9,#06B6D4); width:0%; border-radius:1rem; }
        .episode-btn { background:transparent; border:1px solid rgba(6,182,212,0.35); color:#06B6D4; padding:0.1rem 0.4rem; font-size:0.62rem; border-radius:1rem; cursor:pointer; }
        .episode-btn:hover { background:rgba(6,182,212,0.15); }
        .image-upload-label { display:inline-block; background:linear-gradient(115deg,#6D28D9,#8B5CF6); padding:0.3rem 0.8rem; border-radius:2rem; cursor:pointer; font-size:0.72rem; margin-bottom:0.5rem; }

        /* ── RESPONSIVE ── */
        @media (max-width:1100px) { .charts-grid-dashboard { grid-template-columns:repeat(2,1fr); } }

        /* ── TOAST NOTIFICATIONS ── */
        #toast-container { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; align-items:center; gap:0.5rem; pointer-events:none; width:90%; max-width:380px; }
        .toast { display:flex; align-items:center; gap:0.7rem; padding:0.75rem 1.1rem; border-radius:1rem; font-size:0.82rem; font-weight:600; color:#F8FAFC; backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); box-shadow:0 4px 24px rgba(0,0,0,0.5); pointer-events:auto; animation:toastIn 0.3s ease; width:100%; box-sizing:border-box; }
        @keyframes toastIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        @keyframes toastOut { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(12px); } }
        .toast.success { background:linear-gradient(135deg,rgba(16,185,129,0.92),rgba(5,150,105,0.88)); border:1px solid rgba(16,185,129,0.4); }
        .toast.error   { background:linear-gradient(135deg,rgba(239,68,68,0.92),rgba(185,28,28,0.88));   border:1px solid rgba(239,68,68,0.4); }
        .toast.info    { background:linear-gradient(135deg,rgba(6,182,212,0.92),rgba(8,145,178,0.88));   border:1px solid rgba(6,182,212,0.4); }
        .toast.warning { background:linear-gradient(135deg,rgba(245,158,11,0.92),rgba(180,83,9,0.88));   border:1px solid rgba(245,158,11,0.4); }
        /* ── CONFIRM MODAL ── */
        #confirm-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); z-index:8000; display:flex; align-items:center; justify-content:center; }

<div id="toast-container"></div>
<script>
function showToast(msg, type='info', duration=3000) {
    const icons = { success:'✅', error:'❌', info:'ℹ️', warning:'⚠️' };
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast ' + type;
    toast.innerHTML = '<span style="font-size:1.1rem;flex-shrink:0;">' + icons[type] + '</span><span>' + msg + '</span>';
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.animation = 'toastOut 0.3s ease forwards';
        setTimeout(() => toast.remove(), 300);
    }, duration);
}
function showConfirm(msg, onConfirm, confirmLabel='Eliminar', cancelLabel='Cancelar', danger=true) {
    const overlay = document.createElement('div');
    overlay.id = 'confirm-overlay';
    overlay.innerHTML = '<div class="confirm-box"><h4>' + (danger ? '⚠️ ' : '') + 'Confirmar acción</h4><p>' + msg + '</p><div class="confirm-btns"><button id="cfm-ok" style="flex:1;padding:0.5rem;border-radius:0.7rem;border:none;background:' + (danger ? 'linear-gradient(115deg,#EF4444,#B91C1C)' : 'linear-gradient(115deg,#6D28D9,#8B5CF6)') + ';color:#fff;font-weight:700;font-size:0.8rem;cursor:pointer;">' + confirmLabel + '</button><button id="cfm-cancel" style="flex:1;padding:0.5rem;border-radius:0.7rem;border:1px solid rgba(45,58,94,0.8);background:transparent;color:#94A3B8;font-weight:600;font-size:0.8rem;cursor:pointer;">' + cancelLabel + '</button></div></div>';
    document.body.appendChild(overlay);
    document.getElementById('cfm-ok').onclick = () => { overlay.remove(); onConfirm(); };
    document.getElementById('cfm-cancel').onclick = () => overlay.remove();
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
}
</script>

        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

        const rated = contents.filter(c =>
            c.type === 'pelicula' &&
            c.ratings?.partner1 !== undefined &&
            c.ratings?.partner2 !== undefined
        );

        // 1. Puntuación por género: promedio de (rating + entertainment) de ambos
        const genreStats = new Map();
        rated.forEach(c => {
            if (!c.genre) return;
            const ratingAvg = (c.ratings.partner1 + c.ratings.partner2) / 2;
            const entAvg = ((c.entertainment?.partner1 || ratingAvg) + (c.entertainment?.partner2 || ratingAvg)) / 2;
            const rewatchBonus = (c.rewatch?.partner1 === 'Sí' ? 0.5 : 0) + (c.rewatch?.partner2 === 'Sí' ? 0.5 : 0);
            const likedBonus = (['Me encantó'].includes(c.likedScale?.partner1) ? 0.5 : 0) + (['Me encantó'].includes(c.likedScale?.partner2) ? 0.5 : 0);
            const combinedScore = (ratingAvg * 0.5) + (entAvg * 0.3) + (rewatchBonus * 0.5) + (likedBonus * 0.3);
            if (!genreStats.has(c.genre)) genreStats.set(c.genre, { total: 0, count: 0 });
            const g = genreStats.get(c.genre);
            g.total += combinedScore;
            g.count += 1;
        });

        // Géneros ordenados por score promedio
        const genreRanking = Array.from(genreStats.entries())
            .map(([genre, { total, count }]) => ({ genre, avg: total / count, count }))
            .sort((a, b) => b.avg - a.avg);

        const likedGenres = genreRanking.filter(g => g.avg >= 6).map(g => g.genre);
        const dislikedGenres = genreRanking.filter(g => g.avg < 5).map(g => g.genre);

        // 2. Duración preferida: promedio de duración de películas con score alto
        const highRated = rated.filter(c => (c.ratings.partner1 + c.ratings.partner2) / 2 >= 7 && c.durationMinutes > 0);
        const avgDuration = highRated.length
            ? highRated.reduce((s, c) => s + c.durationMinutes, 0) / highRated.length
            : null;

        // 3. coupleScore mejorado: incluye entertainment y rewatch
        function enrichedCoupleScore(movie) {
            if (movie.ratings?.partner1 === undefined || movie.ratings?.partner2 === undefined) return null;
            const p1 = movie.ratings.partner1, p2 = movie.ratings.partner2;
            const avg = (p1 + p2) / 2;
            const penalty = Math.abs(p1 - p2) * 0.4;
            const baseScore = avg - penalty;
            const ent1 = movie.entertainment?.partner1 || avg;
            const ent2 = movie.entertainment?.partner2 || avg;
            const entAvg = (ent1 + ent2) / 2;
            const rewatchBonus = (movie.rewatch?.partner1 === 'Sí' ? 0.4 : 0) + (movie.rewatch?.partner2 === 'Sí' ? 0.4 : 0);
            const likedBonus = (movie.likedScale?.partner1 === 'Me encantó' ? 0.3 : 0) + (movie.likedScale?.partner2 === 'Me encantó' ? 0.3 : 0);
            return (baseScore * 0.55) + (entAvg * 0.3) + rewatchBonus + likedBonus;
        }

        return { genreRanking, likedGenres, dislikedGenres, avgDuration, enrichedCoupleScore };
    }

    function computeCoupleScore(movie) {
        if (!movie.ratings || movie.ratings.partner1 === undefined || movie.ratings.partner2 === undefined) return null;
        const p1 = movie.ratings.partner1, p2 = movie.ratings.partner2;
        const avg = (p1 + p2) / 2;
        const penalty = Math.abs(p1 - p2) * 0.4;
        const baseScore = avg - penalty;
        const ent1 = movie.entertainment?.partner1 || avg;
        const ent2 = movie.entertainment?.partner2 || avg;
        const entAvg = (ent1 + ent2) / 2;
        const rewatchBonus = (movie.rewatch?.partner1 === 'Sí' ? 0.4 : 0) + (movie.rewatch?.partner2 === 'Sí' ? 0.4 : 0);
        const likedBonus = (movie.likedScale?.partner1 === 'Me encantó' ? 0.3 : 0) + (movie.likedScale?.partner2 === 'Me encantó' ? 0.3 : 0);
        return (baseScore * 0.55) + (entAvg * 0.3) + rewatchBonus + likedBonus;
    }

    function getFavoriteMovies(contents) {
        const movies = contents.filter(c => c.type === 'pelicula' && c.ratings?.partner1 !== undefined && c.ratings?.partner2 !== undefined && c.tmdbId);
        const withScore = movies.map(m => ({ ...m, coupleScore: computeCoupleScore(m) })).filter(m => m.coupleScore >= 7.5);
        withScore.sort((a, b) => b.coupleScore - a.coupleScore);
        return withScore.slice(0, 6);
    }

    async function fetchRecommendationsFromSeeds(seeds, watchedIds, wishlistIds, dislikedGenres) {
        if (!seeds.length) return [];
        const candidatesMap = new Map();
        for (const seed of seeds) {
            if (!seed.tmdbId) continue;
            try {
                const url = `https://api.themoviedb.org/3/movie/${seed.tmdbId}/recommendations?api_key=${TMDB_API_KEY}&language=es&page=1`;
                const res = await fetch(url);
                const data = await res.json();
                if (data.results && data.results.length) {
                    for (const rec of data.results) {
                        if (!rec.poster_path) continue;
                        if (rec.vote_count < 150) continue;
                        if (rec.vote_average <= 7.0) continue;
                        if (watchedIds.includes(rec.id)) continue;
                        if (wishlistIds.includes(rec.id)) continue;
                        if (!candidatesMap.has(rec.id)) {
                            candidatesMap.set(rec.id, {
                                id: rec.id,
                                title: rec.title,
                                year: rec.release_date ? rec.release_date.split('-')[0] : '',
                                posterUrl: `https://image.tmdb.org/t/p/w500${rec.poster_path}`,
                                tmdbRating: rec.vote_average,
                                popularity: rec.popularity,
                                seedTitle: seed.title,
                                tmdbGenreIds: rec.genre_ids || []
                            });
                        }
                    }
                }
            } catch (e) { console.error(e); }
        }
        // Filtrar géneros que no les gustan si hay suficiente historial
        let results = Array.from(candidatesMap.values());
        if (dislikedGenres.length > 0) {
            const dislikedIds = dislikedGenres.map(g => TMDB_GENRE_IDS[g]).filter(Boolean);
            if (dislikedIds.length) {
                const filtered = results.filter(r => !r.tmdbGenreIds.some(gid => dislikedIds.includes(gid)));
                if (filtered.length >= 5) results = filtered;
            }
        }
        return results;
    }

    // Busca candidatos adicionales por géneros favoritos directamente en TMDB discover
    async function fetchByFavoriteGenres(likedGenres, watchedIds, wishlistIds) {
        if (!likedGenres.length) return [];
        const top2Genres = likedGenres.slice(0, 2);
        const genreIds = top2Genres.map(g => TMDB_GENRE_IDS[g]).filter(Boolean);
        if (!genreIds.length) return [];
        const candidates = [];
        try {
            const url = `https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY}&with_genres=${genreIds.join('|')}&sort_by=vote_average.desc&vote_count.gte=300&language=es&page=1`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.results) {
                for (const rec of data.results) {
                    if (!rec.poster_path) continue;
                    if (rec.vote_average <= 7.2) continue;
                    if (watchedIds.includes(rec.id)) continue;
                    if (wishlistIds.includes(rec.id)) continue;
                    candidates.push({
                        id: rec.id,
                        title: rec.title,
                        year: rec.release_date ? rec.release_date.split('-')[0] : '',
                        posterUrl: `https://image.tmdb.org/t/p/w500${rec.poster_path}`,
                        tmdbRating: rec.vote_average,
                        popularity: rec.popularity,
                        seedTitle: `Género: ${top2Genres.join(' / ')}`,
                        tmdbGenreIds: rec.genre_ids || [],
                        fromGenreSearch: true
                    });
                }
            }
        } catch (e) { console.error(e); }
        return candidates.slice(0, 10);
    }

    function rankRecommendations(candidates, avgCoupleScore, genreRanking) {
        // Construir mapa de score por género para bonus
        const genreScoreMap = new Map();
        genreRanking.forEach(g => genreScoreMap.set(g.genre, g.avg));
        const maxGenreScore = genreRanking.length ? genreRanking[0].avg : 10;

        const maxPop = Math.max(...candidates.map(c => c.popularity), 1);

        for (const rec of candidates) {
            const normRating = Math.min(rec.tmdbRating, 10) / 10;
            const normPop = rec.popularity / maxPop;
            const normCouple = Math.min(avgCoupleScore / 10, 1);

            // Bonus de género: si el candidato pertenece a un género que les gusta
            let genreBonus = 0;
            if (rec.tmdbGenreIds && rec.tmdbGenreIds.length) {
                for (const [genre, score] of genreScoreMap.entries()) {
                    const gid = TMDB_GENRE_IDS[genre];
                    if (gid && rec.tmdbGenreIds.includes(gid)) {
                        genreBonus = Math.max(genreBonus, (score / maxGenreScore) * 0.2);
                    }
                }
            }

            // Fórmula mejorada: rating propio 40%, pareja 25%, género 20%, popularidad 15%
            rec.finalScore = (normRating * 0.40 + normCouple * 0.25 + genreBonus + normPop * 0.15) * 10;
            // Bonus extra si viene de búsqueda por género favorito
            if (rec.fromGenreSearch) rec.finalScore += 0.3;
        }

        // Deduplicar por id
        const seen = new Set();
        const unique = candidates.filter(c => { if (seen.has(c.id)) return false; seen.add(c.id); return true; });
        unique.sort((a, b) => b.finalScore - a.finalScore);
        return unique.slice(0, 7);
    }

    async function enrichCandidates(candidates) {
        const enriched = [];
        for (const cand of candidates) {
            try {
                const url = `https://api.themoviedb.org/3/movie/${cand.id}?api_key=${TMDB_API_KEY}&language=es`;
                const res = await fetch(url);
                const data = await res.json();
                cand.genres = data.genres ? data.genres.map(g => g.name) : [];
                cand.runtime = data.runtime || 0;
                if (!cand.tmdbGenreIds || !cand.tmdbGenreIds.length) cand.tmdbGenreIds = data.genres ? data.genres.map(g => g.id) : [];
                enriched.push(cand);
            } catch (e) { enriched.push(cand); }
        }
        return enriched;
    }

    // ── Caché de recomendaciones ──
    const _recCache = {
        data: null,
        timestamp: 0,
        contentsHash: '',
        wishlistHash: '',
        TTL: 30 * 60 * 1000
    };

    function _hashContents(arr) {
        return arr.map(c =>
            `${c.id}:${c.ratings?.partner1}:${c.ratings?.partner2}:${c.entertainment?.partner1}:${c.entertainment?.partner2}:${c.rewatch?.partner1}:${c.rewatch?.partner2}:${c.likedScale?.partner1}:${c.likedScale?.partner2}`
        ).join('|');
    }

    function _recCacheValid() {
        if (!_recCache.data) return false;
        if (Date.now() - _recCache.timestamp > _recCache.TTL) return false;
        if (_hashContents(contents) !== _recCache.contentsHash) return false;
        if (wishlist.map(w => w.id).join(',') !== _recCache.wishlistHash) return false;
        return true;
    }

    function invalidateRecCache() {
        _recCache.data = null;
        _recCache.timestamp = 0;
    }

    async function generateRecommendations() {
        if (!TMDB_API_KEY || TMDB_API_KEY === "TU_API_KEY_DE_TMDB") return [];

        if (_recCacheValid()) return _recCache.data;

        try {
            const prefs = analyzeCouplePreferences(contents);
            const watchedIds = contents.map(c => c.tmdbId).filter(id => id);
            const wishlistIds = wishlist.map(w => w.tmdbId).filter(id => id);
            const favorites = getFavoriteMovies(contents);

            if (favorites.length === 0) {
                let fallbackUrl;
                if (prefs.likedGenres.length) {
                    const gids = prefs.likedGenres.slice(0, 2).map(g => TMDB_GENRE_IDS[g]).filter(Boolean);
                    fallbackUrl = gids.length
                        ? `https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY}&with_genres=${gids.join('|')}&sort_by=vote_average.desc&vote_count.gte=300&language=es&page=1`
                        : `https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY}&sort_by=vote_average.desc&vote_count.gte=500&language=es&page=1`;
                } else {
                    fallbackUrl = `https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY}&sort_by=vote_average.desc&vote_count.gte=500&language=es&page=1`;
                }
                const res = await fetch(fallbackUrl);
                const data = await res.json();
                let fallbackRecs = data.results.filter(rec => rec.poster_path && rec.vote_count >= 200 && rec.vote_average > 7.2 && !watchedIds.includes(rec.id) && !wishlistIds.includes(rec.id)).slice(0, 7);
                fallbackRecs = fallbackRecs.map(rec => ({ id: rec.id, title: rec.title, year: rec.release_date ? rec.release_date.split('-')[0] : '', posterUrl: `https://image.tmdb.org/t/p/w500${rec.poster_path}`, tmdbRating: rec.vote_average, popularity: rec.popularity, seedTitle: null, tmdbGenreIds: rec.genre_ids || [] }));
                const result = await enrichCandidates(fallbackRecs);
                _recCache.data = result;
                _recCache.timestamp = Date.now();
                _recCache.contentsHash = _hashContents(contents);
                _recCache.wishlistHash = wishlist.map(w => w.id).join(',');
                return result;
            }

            const avgCoupleScore = favorites.reduce((sum, f) => sum + f.coupleScore, 0) / favorites.length;

            const [seedCandidates, genreCandidates] = await Promise.all([
                fetchRecommendationsFromSeeds(favorites, watchedIds, wishlistIds, prefs.dislikedGenres),
                fetchByFavoriteGenres(prefs.likedGenres, watchedIds, wishlistIds)
            ]);

            let allCandidates = [...seedCandidates, ...genreCandidates];
            if (allCandidates.length === 0) return [];
            allCandidates = await enrichCandidates(allCandidates);
            const result = rankRecommendations(allCandidates, avgCoupleScore, prefs.genreRanking);

            _recCache.data = result;
            _recCache.timestamp = Date.now();
            _recCache.contentsHash = _hashContents(contents);
            _recCache.wishlistHash = wishlist.map(w => w.id).join(',');
            return result;
        } catch (err) { console.error(err); return []; }
    }

    // ==================== RECOMENDACIÓN ALEATORIA ====================
    let randomCounter = 0, lastRandomTime = 0;

    async function fetchRandomHighRatedMovie() {
        const watchedIds = contents.map(c => c.tmdbId).filter(id => id);
        const wishlistIds = wishlist.map(w => w.tmdbId).filter(id => id);
        const prefs = analyzeCouplePreferences(contents);

        // Construir parámetros de búsqueda usando preferencias reales de la pareja
        let genreParam = '';
        if (prefs.likedGenres.length) {
            // Elegir aleatoriamente entre los géneros favoritos para variedad
            const topGenres = prefs.likedGenres.slice(0, 4);
            const chosenGenre = topGenres[Math.floor(Math.random() * topGenres.length)];
            const gid = TMDB_GENRE_IDS[chosenGenre];
            if (gid) genreParam = `&with_genres=${gid}`;
        }

        // Duración: si conocemos preferencia, filtrar ±30 min alrededor del promedio
        let durationParam = '';
        if (prefs.avgDuration && prefs.avgDuration > 0) {
            const minDur = Math.max(60, Math.round(prefs.avgDuration - 35));
            const maxDur = Math.round(prefs.avgDuration + 45);
            durationParam = `&with_runtime.gte=${minDur}&with_runtime.lte=${maxDur}`;
        }

        // Excluir géneros que no les gustan
        let excludeParam = '';
        if (prefs.dislikedGenres.length) {
            const dislikedIds = prefs.dislikedGenres.map(g => TMDB_GENRE_IDS[g]).filter(Boolean);
            if (dislikedIds.length) excludeParam = `&without_genres=${dislikedIds.join(',')}`;
        }

        const sortModes = ['vote_average.desc', 'popularity.desc', 'vote_average.desc'];
        const sortBy = sortModes[Math.floor(Math.random() * sortModes.length)];
        const maxAttempts = 5;

        for (let attempt = 0; attempt < maxAttempts; attempt++) {
            try {
                const page = Math.floor(Math.random() * 10) + 1;
                // En primeros intentos usar preferencias, en los últimos ampliar sin filtros
                const usePrefs = attempt < 3;
                const url = `https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY}&sort_by=${sortBy}&vote_count.gte=400&language=es&page=${page}${usePrefs ? genreParam : ''}${usePrefs ? durationParam : ''}${usePrefs ? excludeParam : ''}`;
                const res = await fetch(url);
                const data = await res.json();
                if (data.results && data.results.length) {
                    const candidates = data.results.filter(m =>
                        m.vote_average >= 7.2 &&
                        m.poster_path &&
                        !watchedIds.includes(m.id) &&
                        !wishlistIds.includes(m.id)
                    );
                    if (candidates.length) {
                        const rec = candidates[Math.floor(Math.random() * candidates.length)];
                        const detailsUrl = `https://api.themoviedb.org/3/movie/${rec.id}?api_key=${TMDB_API_KEY}&language=es`;
                        const detailsRes = await fetch(detailsUrl);
                        const details = await detailsRes.json();
                        // Calcular por qué se recomienda
                        let reason = 'Bien valorada por la crítica';
                        if (usePrefs && genreParam) {
                            const chosenGenreName = prefs.likedGenres.find(g => TMDB_GENRE_IDS[g] && genreParam.includes(TMDB_GENRE_IDS[g]));
                            if (chosenGenreName) reason = `Género que les gusta: ${chosenGenreName}`;
                        }
                        return {
                            id: rec.id,
                            title: rec.title,
                            year: rec.release_date ? rec.release_date.split('-')[0] : '',
                            posterUrl: `https://image.tmdb.org/t/p/w500${rec.poster_path}`,
                            tmdbRating: rec.vote_average,
                            overview: details.overview || "Sin sinopsis disponible.",
                            runtime: details.runtime || 0,
                            genres: details.genres ? details.genres.map(g => g.name) : [],
                            reason
                        };
                    }
                }
            } catch (e) { console.error(e); }
        }
        return null;
    }

    function canRequestRandom() {
        const now = Date.now();
        if (lastRandomTime === 0) return true;
        const minutesSinceLast = (now - lastRandomTime) / 60000;
        if (minutesSinceLast >= 10) { randomCounter = 0; lastRandomTime = 0; return true; }
        return randomCounter < 5;
    }
    function recordRandomRequest() {
        const now = Date.now();
        if (lastRandomTime === 0 || (now - lastRandomTime) >= 600000) { randomCounter = 1; lastRandomTime = now; }
        else { randomCounter++; lastRandomTime = now; }
    }

    // ==================== DASHBOARD PRINCIPAL ====================
    async function renderHome() {

        if (!panel) return;

        let coupleScores = [];
        contents.forEach(c => {
            if (c.ratings?.partner1 !== undefined && c.ratings?.partner2 !== undefined) {
                let p1 = c.ratings.partner1, p2 = c.ratings.partner2;
                let avg = (p1 + p2) / 2;
                let diff = Math.abs(p1 - p2);
                let score = avg - diff * 0.4;
                coupleScores.push(score);
            }
        });
        let compatibility = coupleScores.length ? (coupleScores.reduce((a,b)=>a+b,0) / coupleScores.length) * 10 : 0;
        compatibility = Math.min(100, Math.max(0, compatibility));
        let totalHours = contents.reduce((acc, c) => acc + (c.durationMinutes || 0), 0) / 60;
        let weekends = new Set();
        contents.forEach(c => { if (c.viewDate) { let date = new Date(c.viewDate); let day = date.getDay(); if (day === 0 || day === 6) weekends.add(date.toDateString()); } });
        let streak = weekends.size;

                let p1 = c.ratings.partner1, p2 = c.ratings.partner2;
                let avg = (p1 + p2) / 2;
                let diff = Math.abs(p1 - p2);
                let score = avg - diff * 0.4;
                if (score > bestScore) { bestScore = score; bestMovie = c; }
            }
        });
        let topRecomendation = bestMovie ? bestMovie.title : 'Ninguna';
        let genreScores = new Map();
        contents.forEach(c => {

        // Carruseles
        function createOverlapCarousel(trackId, items, cardRenderer, prevBtnId, nextBtnId, autoInterval = 3000) {
            const track = document.getElementById(trackId);
            if (!track) return null;
            if (!items || items.length === 0) { if (track.parentElement) track.parentElement.innerHTML = '<div style="color:#94A3B8; text-align:center; padding:1rem;">No hay elementos.</div>'; return null; }
            let currentIndex = 0, autoTimer = null;
            function renderSlides() {
                const total = items.length;
                const leftIndex = (currentIndex - 1 + total) % total;
                const rightIndex = (currentIndex + 1) % total;
                const slides = [items[leftIndex], items[currentIndex], items[rightIndex]];
                track.innerHTML = '';
                slides.forEach((item, idx) => {
                    const slideDiv = document.createElement('div');
                    slideDiv.className = 'carousel-slide-3';
                    if (idx !== 1) slideDiv.classList.add('blurred');
                    slideDiv.appendChild(cardRenderer(item));
                    track.appendChild(slideDiv);
                });
            }
            function goNext() { currentIndex = (currentIndex + 1) % items.length; renderSlides(); resetAuto(); }
            function goPrev() { currentIndex = (currentIndex - 1 + items.length) % items.length; renderSlides(); resetAuto(); }
            function startAuto() { if (autoTimer) clearInterval(autoTimer); autoTimer = setInterval(goNext, autoInterval); }
            function resetAuto() { if (autoTimer) clearInterval(autoTimer); startAuto(); }
            const prevBtn = document.getElementById(prevBtnId), nextBtn = document.getElementById(nextBtnId);
            if (prevBtn) prevBtn.addEventListener('click', () => { goPrev(); resetAuto(); });
            if (nextBtn) nextBtn.addEventListener('click', () => { goNext(); resetAuto(); });
            renderSlides(); startAuto();
        }

    function initResizers(table) {
        const ths = table.querySelectorAll('th');
        ths.forEach((th, index) => {
            if (index === 0) return;
            const resizer = document.createElement('div');
            resizer.classList.add('resizer');
            th.style.position = 'relative';
            th.appendChild(resizer);
            let startX, startWidth;
            resizer.addEventListener('mousedown', (e) => {
                e.preventDefault();
                startX = e.clientX;
                startWidth = th.offsetWidth;
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
            const onMouseMove = (e) => {
                const newWidth = startWidth + (e.clientX - startX);
                if (newWidth > 50) {
                    th.style.width = newWidth + 'px';
                    th.style.minWidth = newWidth + 'px';
                }
            };
            const onMouseUp = () => {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            };
        });
    }

                <div style="margin-left:auto; display:flex; align-items:center; gap:0.6rem;">
                    <div style="display:flex; align-items:center; gap:3px; font-size:0.62rem; color:${pinCount>=5?'#F59E0B':'#334155'}; background:${pinCount>=5?'rgba(245,158,11,0.1)':'rgba(15,20,45,0.5)'}; border:1px solid ${pinCount>=5?'rgba(245,158,11,0.3)':'rgba(45,58,94,0.5)'}; border-radius:2rem; padding:0.15rem 0.5rem;">
                        ${IC.pin} ${pinCount}/5
                    </div>
                    ${addBtnId === 'addFromLibraryBtn' ? `<button id="incompleteFilterBtn" style="font-size:0.65rem; padding:0.22rem 0.7rem; border-radius:2rem; border:1px solid ${libraryShowIncomplete?'rgba(245,158,11,0.7)':'rgba(45,58,94,0.7)'}; background:${libraryShowIncomplete?'rgba(245,158,11,0.15)':'transparent'}; color:${libraryShowIncomplete?'#F59E0B':'#475569'}; cursor:pointer; font-weight:${libraryShowIncomplete?700:500}; transition:all 0.18s; white-space:nowrap;">⏸ No terminadas</button>` : ''}
                    <button id="${addBtnId}" class="primary small" style="font-size:0.65rem; padding:0.22rem 0.7rem; background:linear-gradient(105deg,#6D28D9,#8B5CF6); border-radius:2rem; border:none; color:#fff; cursor:pointer;">+ Agregar</button>
                </div>
            </div>`;
        }

        function buildCard(movie, isPinned, canPin, ratingSpanFn, actionsFn, isWishlist=false) {
            const tCols   = typeCols[movie.type||'pelicula'] || typeCols.pelicula;
            const tIcon   = typeIcon[movie.type||'pelicula'];
            const tLabel  = typeLabel[movie.type||'pelicula'];
            const isSeries= movie.type==='serie' || movie.type==='novela';
            const total   = movie.totalEpisodes || 0;
            const watched = movie.watchedEpisodes || 0;
            const pct     = total ? Math.round(watched/total*100) : 0;
            const p1      = movie.ratings?.partner1 ?? null;
            const p2      = movie.ratings?.partner2 ?? null;
            const avg     = (!isWishlist && p1!==null && p2!==null) ? ((p1+p2)/2).toFixed(1) : null;

            const card = document.createElement('div');
            card.className = 'lib-card';
            card.dataset.id = movie.id;
            card.style.cssText = `position:relative; border-radius:1.1rem; overflow:hidden;
                background:linear-gradient(175deg,rgba(10,15,36,0.98) 0%,rgba(16,26,58,0.95) 100%);
                border:1px solid ${isPinned ? tCols.border : 'rgba(30,41,70,0.9)'};
                box-shadow:${isPinned ? `0 0 22px ${tCols.glow}, 0 4px 20px rgba(0,0,0,0.5)` : '0 2px 16px rgba(0,0,0,0.5)'};
                cursor:pointer; transition:border 0.2s, box-shadow 0.2s, transform 0.2s;`;

            card.innerHTML = `
                <div style="position:relative; width:100%; aspect-ratio:2/3; overflow:hidden; background:#080d1e;">
                    ${movie.posterUrl
                        ? `<img src="${movie.posterUrl}" class="lib-poster" style="width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.35s;">`
                        : `<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:rgba(45,58,94,0.7);">${tIcon}</div>`
                    }
                    <!-- gradient overlay always -->
                    <div style="position:absolute; inset:0; background:linear-gradient(180deg, transparent 45%, rgba(8,13,30,0.95) 100%); pointer-events:none;"></div>
                    <!-- hover overlay -->
                    <div class="lib-overlay" style="position:absolute; inset:0; background:rgba(8,13,30,0.88); opacity:0; transition:opacity 0.22s; display:flex; flex-direction:column; justify-content:flex-end; padding:0.6rem; gap:0.28rem;">
                        ${!isWishlist ? `
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-size:0.55rem; color:#475569; text-transform:uppercase; letter-spacing:0.05em;">${currentCouple.namePartner1}</span>
                            ${ratingSpanFn('partner1', p1)}
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-size:0.55rem; color:#475569; text-transform:uppercase; letter-spacing:0.05em;">${currentCouple.namePartner2}</span>
                            ${ratingSpanFn('partner2', p2)}
                        </div>
                        <div style="display:flex; justify-content:center; align-items:center; padding-top:0.12rem; border-top:1px solid rgba(255,255,255,0.05);">
                            ${avg ? `<span style="font-size:0.63rem; color:${tCols.accent}; font-weight:700; text-align:center;" title="Promedio combinado entre ${currentCouple.namePartner1} y ${currentCouple.namePartner2}">⌀ Promedio pareja ${avg}</span>` : ''}
                        </div>
                        ${movie.tmdbRating ? `
                        <div style="display:flex; justify-content:space-between; align-items:center; padding-top:0.1rem; border-top:1px solid rgba(255,255,255,0.04);">
                            <span style="font-size:0.55rem; color:#475569; text-transform:uppercase; letter-spacing:0.05em;">TMDB</span>
                            <span style="cursor:default; color:#F59E0B; font-size:0.65rem; font-weight:700; display:inline-flex; align-items:center; gap:2px; border-radius:0.35rem; padding:0.13rem 0.3rem; background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.25); min-width:52px; justify-content:center;">
                                ${IC.star} ${movie.tmdbRating.toFixed(1)}
                            </span>
                        </div>` : ''}` : ''}
                        ${isSeries && !isWishlist ? `
                        <div>
                            <div style="height:2px; border-radius:2px; background:rgba(45,58,94,0.5); overflow:hidden; margin-bottom:0.12rem;">
                                <div style="height:100%; width:${pct}%; background:linear-gradient(90deg,${tCols.accent},#06B6D4); border-radius:2px;"></div>
                            </div>
                            <div style="font-size:0.52rem; color:#334155; text-align:right;">${watched}/${total||'?'} ep · ${pct}%</div>
                        </div>` : ''}
                        ${actionsFn(movie)}
                    </div>
                    <!-- type badge -->
                    <div style="position:absolute; top:0.38rem; left:0.38rem; background:rgba(8,13,30,0.82); border:1px solid rgba(255,255,255,0.06); border-radius:0.32rem; padding:0.1rem 0.28rem; font-size:0.5rem; color:#475569; backdrop-filter:blur(4px); display:flex; align-items:center; gap:2px; pointer-events:none;">
                        <span style="display:flex;">${si(tIcon,9,9)}</span>${tLabel}
                    </div>
                    <!-- pin badge + unpin button + unrated badge -->
                    ${isPinned ? `<div class="pin-badge-visible" style="position:absolute; top:0.38rem; right:0.38rem; background:${tCols.accent}; border-radius:0.32rem; padding:0.1rem 0.28rem; display:flex; align-items:center; color:#0B1120; pointer-events:none;">${IC.pin}</div>` : ''}
                    <button class="pin-btn" data-id="${movie.id}" title="${isPinned?'Desanclar':'Anclar'}" style="position:absolute; top:0.38rem; right:0.38rem; background:${isPinned?'rgba(245,158,11,0.88)':'rgba(8,13,30,0.78)'}; border:1px solid ${isPinned?'rgba(245,158,11,0.6)':'rgba(255,255,255,0.1)'}; color:${isPinned?'#0B1120':'#475569'}; border-radius:0.38rem; width:24px; height:24px; display:none; align-items:center; justify-content:center; cursor:${canPin||isPinned?'pointer':'not-allowed'}; backdrop-filter:blur(5px); transition:all 0.18s;">${isPinned ? IC.pinOff : IC.pin}</button>
                </div>
                <!-- card footer -->
                <div style="padding:0.48rem 0.52rem 0.52rem;">
                    <div style="font-size:0.67rem; font-weight:700; color:#E2E8F0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:-0.01em;">${escapeHtml(movie.title)}</div>
                    <div style="font-size:0.55rem; color:#334155; margin-top:0.06rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${movie.year||''} ${movie.genre?'· '+movie.genre:''}</div>
                    ${!isWishlist && movie.viewDate ? `<div style="font-size:0.52rem; color:#475569; margin-top:0.14rem; display:flex; align-items:center; gap:2px;">${IC.cal} ${formatDate(movie.viewDate)}</div>` : ''}
                    ${isWishlist && movie.durationMinutes ? `<div style="font-size:0.52rem; color:#334155; margin-top:0.1rem; display:flex; align-items:center; gap:2px;">${IC.clock} ${movie.durationMinutes} min</div>` : ''}
                    ${isSeries && isWishlist ? `<div style="font-size:0.52rem; color:#334155; margin-top:0.1rem;">${movie.totalEpisodes ? movie.totalEpisodes+' ep' : ''}</div>` : ''}
                    ${!isWishlist && currentPerson === 'partner1' && p1 === null ? `<button class="sin-calificar-badge" data-id="${movie.id}" data-person="partner1" style="margin-top:0.3rem;width:100%;font-size:0.58rem;font-weight:700;color:#F59E0B;background:rgba(245,158,11,0.10);border:1px solid rgba(245,158,11,0.40);border-radius:0.5rem;padding:0.22rem 0;cursor:pointer;letter-spacing:0.04em;transition:all 0.18s;" onmouseover="this.style.background='rgba(245,158,11,0.20)'" onmouseout="this.style.background='rgba(245,158,11,0.10)'">★ Calificar</button>` : ''}
                    ${!isWishlist && currentPerson === 'partner2' && p2 === null ? `<button class="sin-calificar-badge" data-id="${movie.id}" data-person="partner2" style="margin-top:0.3rem;width:100%;font-size:0.58rem;font-weight:700;color:#F59E0B;background:rgba(245,158,11,0.10);border:1px solid rgba(245,158,11,0.40);border-radius:0.5rem;padding:0.22rem 0;cursor:pointer;letter-spacing:0.04em;transition:all 0.18s;" onmouseover="this.style.background='rgba(245,158,11,0.20)'" onmouseout="this.style.background='rgba(245,158,11,0.10)'">★ Calificar</button>` : ''}
                    ${!isWishlist && movie.incomplete ? `<div style="margin-top:0.28rem;width:100%;font-size:0.57rem;font-weight:700;color:#F97316;background:rgba(249,115,22,0.10);border:1px solid rgba(249,115,22,0.38);border-radius:0.5rem;padding:0.18rem 0;text-align:center;letter-spacing:0.04em;">⏸ Pendiente de terminar</div>` : ''}
                </div>
            `;

            const overlay  = card.querySelector('.lib-overlay');
            const poster   = card.querySelector('.lib-poster');
            const pinBtn   = card.querySelector('.pin-btn');
            const pinBadge = card.querySelector('.pin-badge-visible');
            card.addEventListener('mouseenter', () => {
                overlay.style.opacity = '1';
                if (poster) poster.style.transform = 'scale(1.06)';
                if (pinBtn) pinBtn.style.display = 'flex';
                if (pinBadge) pinBadge.style.display = 'none';
                card.style.transform = 'translateY(-2px)';
                card.style.boxShadow = `0 8px 28px rgba(0,0,0,0.6), 0 0 0 1px ${tCols.border}`;
            });
            card.addEventListener('mouseleave', () => {
                overlay.style.opacity = '0';
                if (poster) poster.style.transform = 'scale(1)';
                if (pinBtn) pinBtn.style.display = 'none';
                if (pinBadge) pinBadge.style.display = 'flex';
                card.style.transform = '';
                card.style.boxShadow = isPinned ? `0 0 22px ${tCols.glow}, 0 4px 20px rgba(0,0,0,0.5)` : '0 2px 16px rgba(0,0,0,0.5)';
            });

            return card;
        }


        let sorted = [...contents];
        const dir = librarySortDir === 'asc' ? 1 : -1;
        if (librarySortBy === 'date')         sorted.sort((a,b) => dir * (a.viewDate||'').localeCompare(b.viewDate||''));
        else if (librarySortBy === 'partner1') sorted.sort((a,b) => dir * ((a.ratings?.partner1||0)-(b.ratings?.partner1||0)));
        else if (librarySortBy === 'partner2') sorted.sort((a,b) => dir * ((a.ratings?.partner2||0)-(b.ratings?.partner2||0)));
        else if (librarySortBy === 'global')   sorted.sort((a,b) => dir * ((a.tmdbRating||0)-(b.tmdbRating||0)));

        const pinnedCat = pinnedByCategory;
        // Anclados en la categoría activa siempre primero
        sorted = [...sorted.filter(m=>pinnedCat[libraryFilterType].has(m.id)), ...sorted.filter(m=>!pinnedCat[libraryFilterType].has(m.id))];
        let filtered = libraryFilterType === 'all' ? sorted : sorted.filter(m=>(m.type||'pelicula')===libraryFilterType);
        if (libraryShowIncomplete) filtered = filtered.filter(m => m.incomplete === true);

        const sortOptions = `
            <option value="date"     ${librarySortBy==='date'     ?'selected':''}>Fecha</option>
            <option value="partner1" ${librarySortBy==='partner1' ?'selected':''}>Nota ${currentCouple.namePartner1}</option>
            <option value="partner2" ${librarySortBy==='partner2' ?'selected':''}>Nota ${currentCouple.namePartner2}</option>
            <option value="global"   ${librarySortBy==='global'   ?'selected':''}>Global</option>
        `;

        panel.innerHTML = buildToolbar(libraryFilterType, pinnedCat, librarySortBy, sortOptions, 'addFromLibraryBtn')
            + `<div id="libraryCardGrid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(162px,1fr)); gap:0.9rem;"></div>`;

        document.getElementById('sortSelect').onchange = e => { librarySortBy = e.target.value; renderLibrary(); };
        document.getElementById('addFromLibraryBtn').onclick = () => showAddMovieModal();
        document.querySelectorAll('.filter-type-btn').forEach(btn => btn.onclick = () => { libraryFilterType = btn.dataset.type; renderLibrary(); });
        const dirBtn = document.getElementById('sortDirBtn');
        if (dirBtn) dirBtn.onclick = () => { librarySortDir = librarySortDir === 'desc' ? 'asc' : 'desc'; renderLibrary(); };
        const incBtn = document.getElementById('incompleteFilterBtn');
        if (incBtn) incBtn.onclick = () => { libraryShowIncomplete = !libraryShowIncomplete; renderLibrary(); };

        const grid = document.getElementById('libraryCardGrid');
        if (filtered.length === 0) {
            grid.innerHTML = `<p style="color:#334155; font-size:0.78rem; padding:3rem; grid-column:1/-1; text-align:center; letter-spacing:0.04em;">Sin contenido${libraryFilterType!=='all'?' en este filtro':''}.</p>`;
            return;
        }

        const ratingSpanFn = (person, val, movieId) => {
            const isMe    = person === currentPerson;
            const movie   = contents.find(c => c.id === movieId);
            const canRate = isMe && movie && (movie.type==='pelicula' || movie.seriesCompleted);
            return `<span class="rating-value" data-id="${movieId}" data-person="${person}"
                style="cursor:${canRate?'pointer':'default'}; color:${val!==null?'#F59E0B':'#1E293B'}; font-size:0.65rem; font-weight:700;
                display:inline-flex; align-items:center; gap:2px; border-radius:0.35rem; padding:0.13rem 0.3rem;
                background:${val!==null?'rgba(245,158,11,0.1)':'rgba(15,20,45,0.6)'};
                border:1px solid ${val!==null?'rgba(245,158,11,0.25)':'rgba(30,41,70,0.8)'};
                transition:background 0.15s;">
                ${IC.star} ${val!==null ? val : '—'}
            </span>`;
        };

        const actionsFn = (movie) => {
            const isSeries = movie.type==='serie' || movie.type==='novela';
            const isInc = movie.incomplete === true;
            const fullyRated = movie.ratings?.partner1 != null && movie.ratings?.partner2 != null;
            return `<div style="display:flex; gap:0.3rem; margin-top:0.1rem;">
                <button class="edit-movie" data-id="${movie.id}" style="flex:1; font-size:0.57rem; padding:0.2rem 0; background:rgba(109,40,217,0.2); border:1px solid rgba(109,40,217,0.4); color:#A78BFA; border-radius:0.45rem; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:2px;">${IC.edit} Editar</button>
                <button class="delete-movie" data-id="${movie.id}" style="flex:1; font-size:0.57rem; padding:0.2rem 0; background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.35); color:#F87171; border-radius:0.45rem; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:2px;">${IC.trash} Borrar</button>
            </div>
            ${!fullyRated ? `<button class="toggle-incomplete" data-id="${movie.id}" data-inc="${isInc}" style="width:100%; margin-top:0.25rem; font-size:0.57rem; padding:0.2rem 0; background:${isInc?'rgba(249,115,22,0.18)':'rgba(249,115,22,0.08)'}; border:1px solid ${isInc?'rgba(249,115,22,0.55)':'rgba(249,115,22,0.22)'}; color:${isInc?'#FB923C':'#94A3B8'}; border-radius:0.45rem; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:2px;">⏸ ${isInc?'Marcar terminada':'No terminé de verla'}</button>` : ''}
            ${isSeries ? `<button class="add-episode" data-id="${movie.id}" style="width:100%; margin-top:0.25rem; font-size:0.57rem; padding:0.2rem 0; background:rgba(6,182,212,0.12); border:1px solid rgba(6,182,212,0.28); color:#67E8F9; border-radius:0.45rem; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:2px;">${IC.plus} Ep. visto</button>` : ''}`;
        };

        for (const movie of filtered) {
            const isPinned = pinnedCat[libraryFilterType].has(movie.id);
            const canPin   = isPinned || pinnedCat[libraryFilterType].size < 5;
            const rsFn     = (person, val) => ratingSpanFn(person, val, movie.id);
            const card     = buildCard(movie, isPinned, canPin, rsFn, actionsFn);
            card.addEventListener('click', e => {
                if (!e.target.closest('button') && !e.target.closest('.rating-value')) showCompactSummary(movie.id);
            });
            grid.appendChild(card);
        }

        // Pin
        document.querySelectorAll('.pin-btn').forEach(btn => {
            btn.onclick = e => {
                e.stopPropagation();
                const id = btn.dataset.id;
                const cat = libraryFilterType;
                if (pinnedCat[cat].has(id)) { pinnedCat[cat].delete(id); renderLibrary(); }
                else if (pinnedCat[cat].size < 5) { pinnedCat[cat].add(id); renderLibrary(); }
                else { showToast('Máximo 5 anclados. Desancla uno primero.', 'warning'); }
            };
        });
        document.querySelectorAll('.edit-movie').forEach(btn => btn.onclick = e => { e.stopPropagation(); showEditModal(btn.dataset.id); });
        document.querySelectorAll('.delete-movie').forEach(btn => btn.onclick = async e => {
            e.stopPropagation();
            showConfirm('¿Seguro que quieres eliminar este contenido?', async () => { Object.values(pinnedByCategory).forEach(s=>s.delete(btn.dataset.id)); await db.collection('contents').doc(btn.dataset.id).delete(); });
        });
        document.querySelectorAll('.toggle-incomplete').forEach(btn => btn.onclick = async e => {
            e.stopPropagation();
            const id = btn.dataset.id;
            const isInc = btn.dataset.inc === 'true';
            await db.collection('contents').doc(id).update({ incomplete: !isInc });
        });
        document.querySelectorAll('.rating-value').forEach(el => {
            el.onclick = e => {
                e.stopPropagation();
                if (el.dataset.person !== currentPerson) { showToast('Solo puedes editar tu propia nota.', 'warning'); return; }
                const movie = contents.find(c => c.id === el.dataset.id);
                if (movie.type !== 'pelicula' && !movie.seriesCompleted) { showToast('Primero completa la serie/novela.', 'warning'); return; }
                showFullRatingModal(el.dataset.id, el.dataset.person);
            };
        });
        // Calificar badge → abre modal de calificación para el partner correcto
        document.querySelectorAll('.sin-calificar-badge').forEach(badge => {
            badge.onclick = e => {
                e.stopPropagation();
                const movieId = badge.dataset.id;
                const person  = badge.dataset.person;
                const movie   = contents.find(c => c.id === movieId);
                if (!movie || !person) return;
                if (movie.type !== 'pelicula' && !movie.seriesCompleted) { showToast('Primero completa la serie/novela para calificar.', 'warning'); return; }
                showFullRatingModal(movieId, person);
            };
        });
        document.querySelectorAll('.add-episode').forEach(btn => {
            btn.onclick = async e => {
                e.stopPropagation();
                const id = btn.dataset.id;
                const movie = contents.find(c => c.id === id);
                if (!movie) return;
                const modalDiv = document.getElementById('modal');
                modalDiv.innerHTML = `<div class="modal-content">
                    <h3 style="margin-bottom:1rem; color:#06B6D4;">Registrar episodio</h3>
                    <p style="margin-bottom:0.8rem;"><strong>${escapeHtml(movie.title)}</strong></p>
                    <div><label class="question-label">Temporada</label><input type="number" id="seasonNum" min="1" value="1"></div>
                    <div><label class="question-label">Episodio</label><input type="number" id="episodeNum" min="1" value="${(movie.watchedEpisodes||0)+1}"></div>
                    <div><label class="question-label">¿Final de temporada?</label><select id="isSeasonFinal"><option value="false">No</option><option value="true">Sí</option></select></div>
                    <div><label class="question-label">¿Final de serie?</label><select id="isSeriesFinal"><option value="false">No</option><option value="true">Sí</option></select></div>
                    <div class="flex-buttons"><button id="saveEpisodeBtn" class="primary">Registrar</button><button id="closeEpisodeModal" class="outline">Cancelar</button></div>
                </div>`;
                modalDiv.classList.remove('hidden');
                document.getElementById('closeEpisodeModal').onclick = () => modalDiv.classList.add('hidden');
                document.getElementById('saveEpisodeBtn').onclick = async () => {
                    const season=parseInt(document.getElementById('seasonNum').value), episode=parseInt(document.getElementById('episodeNum').value);
                    const isSF=document.getElementById('isSeasonFinal').value==='true', isSerF=document.getElementById('isSeriesFinal').value==='true';
                    if (isNaN(season)||isNaN(episode)||episode<1) { showToast('Número de episodio inválido.', 'error'); return; }
                    const tot=movie.totalEpisodes||0; let nw=(movie.watchedEpisodes||0)+1;
                    if (nw>tot&&tot>0) { showToast(`Supera el total de episodios (${tot}).`, 'warning'); modalDiv.classList.add('hidden'); return; }
                    const updates={watchedEpisodes:nw};
                    if (isSerF||(isSF&&nw>=tot)) {
                        updates.seriesCompleted=true; updates.viewDate=new Date().toISOString().slice(0,10);
                        await db.collection('contents').doc(id).update(updates);
                        modalDiv.classList.add('hidden');
                        if (currentPerson) showFullRatingModal(id,currentPerson);
                    } else { await db.collection('contents').doc(id).update(updates); modalDiv.classList.add('hidden'); showToast('Episodio registrado.', 'success'); }
                };
            };
        });
    }

    async function showCompactSummary(movieId) {
        const movie = contents.find(c => c.id === movieId);
        if (!movie) return;
        const p1 = movie.ratings?.partner1 ?? null;
        const p2 = movie.ratings?.partner2 ?? null;
        const coupleAvg = (p1 !== null && p2 !== null) ? ((p1 + p2) / 2).toFixed(1) : null;
        const tmdb = movie.tmdbRating ? movie.tmdbRating.toFixed(1) : null;
        const tCols = { pelicula: { border:'rgba(139,92,246,0.5)', accent:'#A78BFA', glow:'rgba(139,92,246,0.22)', gradFrom:'rgba(109,40,217,0.12)' },
                        serie:    { border:'rgba(6,182,212,0.5)',   accent:'#67E8F9', glow:'rgba(6,182,212,0.22)',   gradFrom:'rgba(6,182,212,0.10)' },
                        novela:   { border:'rgba(236,72,153,0.5)',  accent:'#F9A8D4', glow:'rgba(236,72,153,0.22)',  gradFrom:'rgba(236,72,153,0.10)' } };
        const tc = tCols[movie.type||'pelicula'];
        const starSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
        const ratingBadge = (val) => val !== null
            ? `<span style="display:inline-flex;align-items:center;gap:3px;font-size:0.72rem;font-weight:700;color:#F59E0B;background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.32);border-radius:0.45rem;padding:0.18rem 0.6rem;min-width:58px;justify-content:center;">${starSvg} ${val}</span>`
            : `<span style="display:inline-flex;align-items:center;gap:3px;font-size:0.72rem;font-weight:600;color:#334155;background:rgba(15,20,45,0.7);border:1px solid rgba(30,41,70,0.8);border-radius:0.45rem;padding:0.18rem 0.6rem;min-width:58px;justify-content:center;">${starSvg} —</span>`;
        const isSeries = movie.type === 'serie' || movie.type === 'novela';
        const watched = movie.watchedEpisodes || 0;
        const total = movie.totalEpisodes || 0;
        const pct = total ? Math.round(watched/total*100) : 0;

        // Fetch TMDB overview + backdrop if tmdbId available
        let overview = movie.overview || '';
        let backdropUrl = '';
        let directors = '';
        let cast = '';
        if (movie.tmdbId && TMDB_API_KEY) {
            try {
                const mediaType = (movie.type === 'serie' || movie.type === 'novela') ? 'tv' : 'movie';
                const [detailRes, creditsRes] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/${mediaType}/${movie.tmdbId}?api_key=${TMDB_API_KEY}&language=es`),
                    fetch(`https://api.themoviedb.org/3/${mediaType}/${movie.tmdbId}/credits?api_key=${TMDB_API_KEY}&language=es`)
                ]);
                const detail = await detailRes.json();
                const credits = await creditsRes.json();
                if (detail.overview) overview = detail.overview;
                if (detail.backdrop_path) backdropUrl = `https://image.tmdb.org/t/p/w780${detail.backdrop_path}`;
                const dirList = (credits.crew||[]).filter(c=>c.job==='Director').slice(0,2).map(c=>c.name);
                if (dirList.length) directors = dirList.join(', ');
                cast = (credits.cast||[]).slice(0,4).map(c=>c.name).join(', ');
            } catch(e) { /* silently ignore */ }
        }

        // Better poster: replace w200/w342 with w500 for modal
        const posterSrc = (movie.posterUrl||'').replace('/w200','/w500').replace('/w342','/w500') || 'https://via.placeholder.com/160x240?text=?';

        const modalDiv = document.getElementById('modal');
        modalDiv.innerHTML = `
            <div style="position:fixed;inset:0;background:rgba(4,7,18,0.85);backdrop-filter:blur(14px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;" id="compactOverlay">
                <div style="background:linear-gradient(165deg,rgba(6,10,26,0.99),rgba(12,20,50,0.98));border:1px solid ${tc.border};border-radius:1.6rem;box-shadow:0 0 60px ${tc.glow},0 12px 60px rgba(0,0,0,0.8);max-width:500px;width:100%;overflow:hidden;position:relative;max-height:90vh;display:flex;flex-direction:column;">
                    <!-- Backdrop hero -->
                    ${backdropUrl ? `<div style="position:relative;width:100%;height:130px;overflow:hidden;flex-shrink:0;">
                        <img src="${backdropUrl}" style="width:100%;height:100%;object-fit:cover;display:block;opacity:0.55;">
                        <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,10,26,0.1) 0%,rgba(6,10,26,0.98) 100%);"></div>
                        <div style="position:absolute;inset:0;background:linear-gradient(90deg,${tc.gradFrom},transparent);"></div>
                    </div>` : `<div style="height:4px;background:linear-gradient(90deg,${tc.accent}44,${tc.accent},${tc.accent}44);flex-shrink:0;"></div>`}
                    <!-- Main content -->
                    <div style="display:flex;gap:0;align-items:flex-start;padding:${backdropUrl?'0':'1rem'} 1.1rem 0;flex-shrink:0;${backdropUrl?'margin-top:-70px;position:relative;z-index:1;':''}" >
                        <!-- Poster -->
                        <div style="flex-shrink:0;width:110px;border-radius:0.9rem;overflow:hidden;border:2px solid ${tc.border};box-shadow:0 4px 20px rgba(0,0,0,0.6),0 0 20px ${tc.glow};margin-right:1rem;${backdropUrl?'margin-top:0;':''}">
                            <img src="${posterSrc}" alt="${escapeHtml(movie.title)}" style="width:110px;height:165px;object-fit:cover;display:block;">
                        </div>
                        <!-- Title + meta -->
                        <div style="flex:1;min-width:0;padding-top:${backdropUrl?'0.5rem':'0'};">
                            <div style="font-size:0.5rem;font-weight:700;color:${tc.accent};text-transform:uppercase;letter-spacing:0.13em;margin-bottom:0.2rem;">${movie.type==='serie'?'Serie':movie.type==='novela'?'Novela':'Película'}</div>
                            <div style="font-size:1.05rem;font-weight:800;color:#F1F5F9;line-height:1.2;letter-spacing:-0.01em;margin-bottom:0.2rem;">${escapeHtml(movie.title)}</div>
                            <div style="font-size:0.62rem;color:#475569;margin-bottom:0.5rem;">${movie.year||''}${movie.genre?' · '+movie.genre:''}${movie.durationMinutes?' · '+movie.durationMinutes+' min':''}</div>
                            ${directors ? `<div style="font-size:0.58rem;color:#334155;margin-bottom:0.2rem;"><span style="color:#475569;font-weight:600;">Dir:</span> ${directors}</div>` : ''}
                            ${cast ? `<div style="font-size:0.55rem;color:#334155;"><span style="color:#475569;font-weight:600;">Reparto:</span> ${cast}</div>` : ''}
                        </div>
                    </div>
                    <!-- Scrollable body -->
                    <div style="flex:1;overflow-y:auto;padding:0.8rem 1.1rem 0;min-height:0;">
                        <!-- Overview -->
                        ${overview ? `<div style="font-size:0.68rem;color:#94A3B8;line-height:1.6;margin-bottom:0.9rem;padding:0.7rem 0.85rem;background:rgba(255,255,255,0.03);border-radius:0.7rem;border:1px solid rgba(255,255,255,0.05);">${escapeHtml(overview.slice(0,320))}${overview.length>320?'…':''}</div>` : ''}
                        <!-- Ratings -->
                        <div style="display:flex;flex-direction:column;gap:0.32rem;margin-bottom:0.8rem;">
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <span style="font-size:0.58rem;color:#475569;text-transform:uppercase;letter-spacing:0.07em;">${currentCouple.namePartner1}</span>
                                ${ratingBadge(p1)}
                            </div>
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <span style="font-size:0.58rem;color:#475569;text-transform:uppercase;letter-spacing:0.07em;">${currentCouple.namePartner2}</span>
                                ${ratingBadge(p2)}
