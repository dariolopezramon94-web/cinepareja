                            </div>
                            ${tmdb ? `<div style="display:flex;justify-content:space-between;align-items:center;padding-top:0.28rem;border-top:1px solid rgba(255,255,255,0.06);">
                                <span style="font-size:0.58rem;color:#475569;text-transform:uppercase;letter-spacing:0.07em;">TMDB</span>
                                ${ratingBadge(parseFloat(tmdb))}
                            </div>` : ''}
                            ${coupleAvg ? `<div style="text-align:center;padding-top:0.25rem;border-top:1px solid rgba(255,255,255,0.06);">
                                <span style="font-size:0.65rem;font-weight:700;color:${tc.accent};">⌀ Promedio pareja ${coupleAvg}</span>
                            </div>` : ''}
                        </div>
                        <!-- Meta chips -->
                        <div style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:0.8rem;">
                            ${movie.viewDate ? `<span style="font-size:0.55rem;color:#475569;background:rgba(15,20,45,0.8);border:1px solid rgba(30,41,70,0.9);border-radius:2rem;padding:0.14rem 0.55rem;">📅 ${movie.viewDate.slice(0,10)}</span>` : ''}
                            ${isSeries ? `<span style="font-size:0.55rem;color:#475569;background:rgba(15,20,45,0.8);border:1px solid rgba(30,41,70,0.9);border-radius:2rem;padding:0.14rem 0.55rem;">📺 ${watched}/${total||'?'} ep</span>` : ''}
                        </div>
                        <!-- Progress bar series -->
                        ${isSeries && total ? `<div style="margin-bottom:0.8rem;">
                            <div style="height:3px;border-radius:3px;background:rgba(30,41,70,0.8);overflow:hidden;">
                                <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,${tc.accent},#06B6D4);border-radius:3px;"></div>
                            </div>
                            <div style="font-size:0.5rem;color:#334155;text-align:right;margin-top:0.12rem;">${pct}% completado</div>
                        </div>` : ''}
                    </div>
                    <!-- Footer -->
                    <div style="display:flex;gap:0.6rem;padding:0.75rem 1.1rem;border-top:1px solid rgba(255,255,255,0.05);flex-shrink:0;">
                        ${(p1 == null || p2 == null) ? `<button id="toggleIncompleteModal" data-id="${movie.id}" data-inc="${movie.incomplete?'true':'false'}" style="flex:1;background:${movie.incomplete?'rgba(249,115,22,0.18)':'rgba(30,41,70,0.5)'};border:1px solid ${movie.incomplete?'rgba(249,115,22,0.55)':'rgba(45,58,94,0.6)'};color:${movie.incomplete?'#FB923C':'#94A3B8'};border-radius:0.8rem;padding:0.5rem;font-size:0.72rem;cursor:pointer;transition:all 0.18s;">⏸ ${movie.incomplete?'Marcar terminada':'No terminé de verla'}</button>` : ''}
                        <button id="closeCompactModal" style="flex:1;background:rgba(30,41,70,0.7);border:1px solid rgba(45,58,94,0.7);color:#94A3B8;border-radius:0.8rem;padding:0.5rem;font-size:0.72rem;cursor:pointer;transition:all 0.18s;" onmouseover="this.style.borderColor='rgba(6,182,212,0.4)';this.style.color='#E2E8F0'" onmouseout="this.style.borderColor='rgba(45,58,94,0.7)';this.style.color='#94A3B8'">Cerrar</button>
                    </div>
                </div>
            </div>
        `;
        modalDiv.classList.remove('hidden');
        document.getElementById('closeCompactModal').onclick = () => modalDiv.classList.add('hidden');
        document.getElementById('compactOverlay').onclick = (e) => { if(e.target===e.currentTarget) modalDiv.classList.add('hidden'); };
        document.getElementById('toggleIncompleteModal').onclick = async () => {
            const btn = document.getElementById('toggleIncompleteModal');
            const id = btn.dataset.id;
            const isInc = btn.dataset.inc === 'true';
            await db.collection('contents').doc(id).update({ incomplete: !isInc });
            modalDiv.classList.add('hidden');
        };
    }

    function showFullRatingModal(contentId, person) {
        const modalDiv = document.getElementById('modal');
        const today = new Date().toISOString().slice(0,10);
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3 style="margin-bottom:1rem; color:#06B6D4;">Calificar contenido</h3>
                <p>${person === 'partner1' ? currentCouple.namePartner1 : currentCouple.namePartner2}, comparte tu experiencia</p>
                <div><label class="question-label">Fecha</label><input type="date" id="watchedDate" value="${today}"></div>
                <div><label class="question-label">Nota (1-10)</label><input type="number" id="ratingValue" step="0.1" min="1" max="10"></div>
                <div><label class="question-label">¿Qué tanto te gustó?</label><select id="likedScale"><option>Me encantó</option><option>Me gustó</option><option>Neutral</option><option>No me gustó</option><option>La odié</option></select></div>
                <div><label class="question-label">¿La volverías a ver?</label><select id="rewatch"><option>Sí</option><option>No</option><option>Tal vez</option></select></div>
                <div><label class="question-label">Emoción predominante</label><select id="dominantEmotion"><option>Alegría</option><option>Emoción</option><option>Tensión</option><option>Tristeza</option><option>Sorpresa</option><option>Aburrimiento</option><option>Indiferencia</option></select></div>
                <div><label class="question-label">Entretenimiento (1-10)</label><input type="number" id="entertainment" step="1" min="1" max="10"></div>
                <div><label class="question-label">Comentario (opcional)</label><textarea id="commentValue" rows="2"></textarea></div>
                <div class="flex-buttons"><button id="submitRatingFull" class="primary">Guardar</button><button id="closeRatingModal" class="outline">Cancelar</button></div>
            </div>
        `;
        modalDiv.classList.remove('hidden');
        document.getElementById('closeRatingModal').onclick = () => modalDiv.classList.add('hidden');
        document.getElementById('submitRatingFull').onclick = async () => {
            const watchedDate = document.getElementById('watchedDate').value;
            const rating = parseFloat(document.getElementById('ratingValue').value);
            const liked = document.getElementById('likedScale').value;
            const rewatch = document.getElementById('rewatch').value;
            const emotion = document.getElementById('dominantEmotion').value;
            const entertainment = parseInt(document.getElementById('entertainment').value);
            const comment = document.getElementById('commentValue').value;
            if (!watchedDate || isNaN(rating) || rating<1 || rating>10 || isNaN(entertainment) || entertainment<1 || entertainment>10) {
                showToast("Revisa los campos obligatorios.", "error");
                return;
            }
            const updates = {
                [`ratings.${person}`]: rating, [`likedScale.${person}`]: liked, [`rewatch.${person}`]: rewatch,
                [`dominantEmotion.${person}`]: emotion, [`entertainment.${person}`]: entertainment, viewDate: watchedDate
            };
            if (comment.trim()) updates[`comments.${person}`] = comment.trim();
            await db.collection("contents").doc(contentId).update(updates);
            modalDiv.classList.add('hidden');
        };
    }

    async function showEditModal(contentId) {
        const movie = contents.find(c => c.id === contentId);
        if (!movie) return;
        const modalDiv = document.getElementById('modal');
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3 style="margin-bottom:1rem; color:#06B6D4;">Editar contenido</h3>
                <input id="editTitle" value="${escapeHtml(movie.title)}" placeholder="Título">
                <select id="editType"><option value="pelicula" ${movie.type==='pelicula'?'selected':''}>Película</option><option value="serie" ${movie.type==='serie'?'selected':''}>Serie</option><option value="novela" ${movie.type==='novela'?'selected':''}>Novela</option></select>
                <input id="editGenre" value="${escapeHtml(movie.genre||'')}" placeholder="Género">
                <input id="editYear" value="${movie.year||''}" placeholder="Año">
                <input type="date" id="editViewDate" value="${movie.viewDate||''}">
                <div><label class="question-label">Póster (URL o imagen)</label><input id="editPosterUrl" value="${escapeHtml(movie.posterUrl||'')}" placeholder="URL"><label class="image-upload-label">Subir imagen</label><input type="file" id="posterFileUpload" accept="image/*" style="display:none;"></div>
                <input type="number" id="editDuration" value="${movie.durationMinutes||0}" placeholder="Duración (min)">
                ${(movie.type==='serie'||movie.type==='novela')?`<div><label class="question-label">Total episodios</label><input type="number" id="editTotalEpisodes" value="${movie.totalEpisodes||0}"></div>`:''}
                <div class="flex-buttons"><button id="saveEditBtn" class="primary">Guardar</button><button id="closeEditModal" class="outline">Cancelar</button></div>
            </div>
        `;
        modalDiv.classList.remove('hidden');
        document.getElementById('closeEditModal').onclick = () => modalDiv.classList.add('hidden');
        const fileInput = document.getElementById('posterFileUpload');
        const uploadLabel = document.querySelector('.image-upload-label');
        if (uploadLabel) {
            uploadLabel.onclick = () => fileInput.click();
            fileInput.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => { document.getElementById('editPosterUrl').value = event.target.result; };
                    reader.readAsDataURL(file);
                }
            };
        }
        document.getElementById('saveEditBtn').onclick = async () => {
            const updates = {
                title: document.getElementById('editTitle').value.trim(),
                type: document.getElementById('editType').value,
                genre: document.getElementById('editGenre').value.trim(),
                year: document.getElementById('editYear').value.trim(),
                viewDate: document.getElementById('editViewDate').value,
                posterUrl: document.getElementById('editPosterUrl').value.trim(),
                durationMinutes: parseInt(document.getElementById('editDuration').value) || 0
            };
            if (updates.type === 'serie' || updates.type === 'novela') updates.totalEpisodes = parseInt(document.getElementById('editTotalEpisodes')?.value) || 0;
            if (!updates.title) { showToast("Título requerido.", "error"); return; };
            await db.collection("contents").doc(contentId).update(updates);
            modalDiv.classList.add('hidden');
        };
    }

    async function showAddMovieModal() {
        const modalDiv = document.getElementById('modal');
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3 style="margin-bottom:1rem; color:#06B6D4;">Agregar contenido</h3>
                <input type="text" id="searchTitle" placeholder="Buscar por título...">
                <button id="searchTmdbBtn" class="primary" style="width:100%; margin-bottom:0.8rem;">Buscar en TMDB</button>
                <div id="searchResults" class="search-results hidden"></div>
                <div id="manualFields" class="hidden">
                    <hr><h4>Complete manualmente:</h4>
                    <input id="title" placeholder="Título *">
                    <select id="type"><option value="pelicula">Película</option><option value="serie">Serie</option><option value="novela">Novela</option></select>
                    <input type="date" id="viewDate" value="${new Date().toISOString().slice(0,10)}">
                    <input type="number" id="year" placeholder="Año">
                    <select id="genre"><option>Acción</option><option>Comedia</option><option>Drama</option><option>Romance</option><option>Terror</option><option>Ciencia ficción</option></select>
                    <div><label class="question-label">Póster (URL o subir)</label><input id="posterUrl" placeholder="URL"><label class="image-upload-label">Subir imagen</label><input type="file" id="posterFileUpload" accept="image/*" style="display:none;"></div>
                    <input type="number" id="duration" placeholder="Duración (minutos)">
                    <div id="seriesFields" class="hidden"><label class="question-label">Total episodios</label><input type="number" id="totalEpisodes" placeholder="Ej: 24"></div>
                </div>
                <div><label class="question-label">¿Quién añade?</label><select id="adderPerson"><option value="partner1">${currentCouple.namePartner1}</option><option value="partner2">${currentCouple.namePartner2}</option></select></div>
                <button id="saveContentBtn" class="primary" disabled>Guardar</button>
                <button id="closeModalBtn" class="outline">Cancelar</button>
            </div>
        `;
        modalDiv.classList.remove('hidden');
        let selectedData = null;
        document.getElementById('closeModalBtn').onclick = () => modalDiv.classList.add('hidden');
        const fileInput = document.getElementById('posterFileUpload');
        const uploadLabel = document.querySelector('.image-upload-label');
        if (uploadLabel) {
            uploadLabel.onclick = () => fileInput.click();
            fileInput.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => { document.getElementById('posterUrl').value = event.target.result; };
                    reader.readAsDataURL(file);
                }
            };
        }
        document.getElementById('type').addEventListener('change', (e) => {
            const seriesFields = document.getElementById('seriesFields');
            if (e.target.value === 'serie' || e.target.value === 'novela') seriesFields.classList.remove('hidden');
            else seriesFields.classList.add('hidden');
        });
        document.getElementById('searchTmdbBtn').onclick = async () => {
            const query = document.getElementById('searchTitle').value.trim();
            if (!query) { showToast("Escribe un título para buscar.", "warning"); return; }
            const url = `https://api.themoviedb.org/3/search/multi?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&language=es`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                const resultsDiv = document.getElementById('searchResults');
                resultsDiv.innerHTML = '';
                if (data.results.length === 0) {
                    resultsDiv.innerHTML = '<div class="search-result-item">No encontrado. Usar formulario manual.</div>';
                    document.getElementById('manualFields').classList.remove('hidden');
                    document.getElementById('saveContentBtn').disabled = false;
                } else {
                    resultsDiv.classList.remove('hidden');
                    for (let item of data.results.slice(0, 6)) {
                        let detailsUrl = `https://api.themoviedb.org/3/${item.media_type === 'movie' ? 'movie' : 'tv'}/${item.id}?api_key=${TMDB_API_KEY}&language=es`;
                        let detailsRes = await fetch(detailsUrl);
                        let details = await detailsRes.json();
                        let runtime = details.runtime || (details.episode_run_time ? details.episode_run_time[0] : null);
                        let totalEpisodes = null;
                        if (item.media_type === 'tv' && details.seasons) totalEpisodes = details.seasons.reduce((acc,s)=>acc+(s.episode_count||0),0);
                        const div = document.createElement('div');
                        div.className = 'search-result-item';
                        div.innerHTML = `<span>${item.title||item.name} ${item.release_date ? `(${item.release_date.split('-')[0]})` : ''} | ★ ${item.vote_average?.toFixed(1)||'-'}</span><button style="background:none; border:1px solid #06B6D4; border-radius:1rem;">Seleccionar</button>`;
                        div.onclick = () => {
                            const genreMapTmdb = {
                        28:'Acción', 12:'Aventura', 16:'Animación', 35:'Comedia',
                        80:'Crimen', 99:'Documental', 18:'Drama', 14:'Fantasía',
                        27:'Terror', 36:'Historia', 10402:'Música', 9648:'Misterio',
                        10749:'Romance', 878:'Ciencia ficción', 53:'Suspenso',
                        10752:'Bélica', 37:'Western', 10751:'Familia', 10759:'Acción y aventura',
                        10762:'Niños', 10765:'Sci-fi y fantasía', 10766:'Telenovela'
                    };
                            const genreIds = item.genre_ids || (details.genres ? details.genres.map(g=>g.id) : []);
                            const genreName = genreIds.length ? (genreMapTmdb[genreIds[0]] || details.genres?.[0]?.name || '') : '';
                            selectedData = {
                                title: item.title || item.name,
                                year: (item.release_date || item.first_air_date || '').split('-')[0],
                                posterUrl: item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : '',
                                type: item.media_type === 'tv' ? 'serie' : 'pelicula',
                                tmdbRating: item.vote_average || null,
                                duration: runtime || null,
                                totalEpisodes: totalEpisodes,
                                tmdbId: item.id,
                                genre: genreName
                            };
                            document.getElementById('title').value = selectedData.title;
                            document.getElementById('year').value = selectedData.year;
                            document.getElementById('posterUrl').value = selectedData.posterUrl;
                            if (selectedData.type) document.getElementById('type').value = selectedData.type;
                            if (selectedData.duration) document.getElementById('duration').value = selectedData.duration;
                            if (genreName) {
                                const gs = document.getElementById('genre');
                                let found = false;
                                for (let opt of gs.options) { if (opt.value === genreName || opt.text === genreName) { gs.value = opt.value; found = true; break; } }
                                if (!found) { const o = new Option(genreName, genreName, true, true); gs.add(o, 0); gs.value = genreName; }
                            }
                            if (selectedData.type === 'serie' || selectedData.type === 'novela') {
                                document.getElementById('seriesFields').classList.remove('hidden');
                                if (selectedData.totalEpisodes) document.getElementById('totalEpisodes').value = selectedData.totalEpisodes;
                            } else document.getElementById('seriesFields').classList.add('hidden');
                            resultsDiv.classList.add('hidden');
                            document.getElementById('manualFields').classList.remove('hidden');
                            document.getElementById('saveContentBtn').disabled = false;
                        };
                        resultsDiv.appendChild(div);
                    }
                    const manualOption = document.createElement('div');
                    manualOption.className = 'search-result-item';
                    manualOption.innerHTML = '<span>✏️ No encuentras lo que buscas? Agregar manualmente</span>';
                    manualOption.onclick = () => {
                        resultsDiv.classList.add('hidden');
                        document.getElementById('manualFields').classList.remove('hidden');
                        document.getElementById('saveContentBtn').disabled = false;
                    };
                    resultsDiv.appendChild(manualOption);
                }
            } catch(e) { showToast("Error: " + e.message, "error"); document.getElementById('manualFields').classList.remove('hidden'); document.getElementById('saveContentBtn').disabled = false; }
        };
        document.getElementById('saveContentBtn').onclick = async () => {
            let title = document.getElementById('title')?.value.trim();
            if (!title) title = selectedData?.title;
            if (!title) { showToast("Título requerido.", "error"); return; }
            const adder = document.getElementById('adderPerson').value;
            const type = document.getElementById('type').value;
            const newContent = {
                coupleCode: currentCouple.code, title, type,
                viewDate: document.getElementById('viewDate').value,
                year: document.getElementById('year').value,
                genre: document.getElementById('genre').value,
                posterUrl: document.getElementById('posterUrl').value,
                tmdbRating: selectedData?.tmdbRating || null,
                durationMinutes: parseInt(document.getElementById('duration').value) || 0,
                tmdbId: selectedData?.tmdbId || null,
                ratings: {}, completed: {}, comments: {}, likedScale: {}, rewatch: {}, dominantEmotion: {}, entertainment: {}
            };
            if (type === 'serie' || type === 'novela') {
                newContent.totalEpisodes = parseInt(document.getElementById('totalEpisodes').value) || 0;
                newContent.watchedEpisodes = 0;
                newContent.seriesCompleted = false;
            }
            try {
                const docRef = await db.collection("contents").add(newContent);
                modalDiv.classList.add('hidden');
                if (type === 'pelicula') showFullRatingModal(docRef.id, adder);
                else showToast("Serie/novela agregada. Registra episodios.", "success");
            } catch(e) { showToast("Error: " + e.message, "error"); }
        };
    }

    async function renderWishlistTab() {
        const panel = document.getElementById('wishlistPanel');
        if (!panel) return;

        const IC = {
            pin:    `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>`,
            pinOff: `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="2" y1="2" x2="22" y2="22"/><line x1="12" y1="17" x2="12" y2="22"/><path d="M9 9v1.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V17h12"/><path d="M15 9.34V6h1a2 2 0 0 0 0-4H7.89"/></svg>`,
            star:   `<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
            film:   `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="2.18"/><line x1="7" x2="7" y1="2" y2="22"/><line x1="17" x2="17" y1="2" y2="22"/><line x1="2" x2="22" y1="12" y2="12"/><line x1="2" x2="7" y1="7" y2="7"/><line x1="17" x2="22" y1="7" y2="7"/><line x1="17" x2="22" y1="17" y2="17"/><line x1="2" x2="7" y1="17" y2="17"/></svg>`,
            tv:     `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="15" x="2" y="7" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>`,
            book:   `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`,
            edit:   `<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
            trash:  `<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`,
            plus:   `<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
            cal:    `<svg xmlns="http://www.w3.org/2000/svg" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
            check:  `<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
            clock:  `<svg xmlns="http://www.w3.org/2000/svg" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
        };
        const si = (svg, w=10, h=10) => svg.replace(/width="\d+" height="\d+"/, `width="${w}" height="${h}"`);
        const typeIcon  = { pelicula: IC.film, serie: IC.tv, novela: IC.book };
        const typeLabel = { pelicula: 'Película', serie: 'Serie', novela: 'Novela' };
        const typeCols  = { pelicula: { border:'rgba(139,92,246,0.45)', glow:'rgba(139,92,246,0.12)', accent:'#A78BFA' },
                            serie:    { border:'rgba(6,182,212,0.45)',   glow:'rgba(6,182,212,0.12)',   accent:'#67E8F9' },
                            novela:   { border:'rgba(236,72,153,0.45)',  glow:'rgba(236,72,153,0.12)',  accent:'#F9A8D4' } };

        function buildToolbar(filterType, pinnedCat, sortBy, sortOptions, addBtnId, extraLeft='') {
            const cats = ['all','pelicula','serie','novela'];
            const pinCount = pinnedCat[filterType].size;
            return `<div style="display:flex; flex-wrap:wrap; align-items:center; gap:0.5rem; margin-bottom:1rem; padding:0.7rem 1rem; background:linear-gradient(135deg,rgba(12,18,42,0.9),rgba(20,32,72,0.85)); border-radius:0.9rem; border:1px solid rgba(99,179,237,0.09); backdrop-filter:blur(12px);">
                ${sortBy !== null ? `<span style="font-size:0.6rem; color:#475569; font-weight:700; letter-spacing:0.08em; text-transform:uppercase;">Orden</span>
                <select id="sortSelect" style="background:rgba(15,20,45,0.9); color:#94A3B8; border:1px solid #1E293B; border-radius:0.5rem; padding:0.2rem 0.5rem; font-size:0.68rem; outline:none;">${sortOptions}</select>` : ''}
                ${extraLeft}
                <span style="font-size:0.6rem; color:#475569; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; margin-left:${sortBy!==null?'0.3rem':'0'};">Tipo</span>
                ${cats.map(t => { const a=filterType===t; return `<button class="filter-type-btn" data-type="${t}" style="font-size:0.65rem; padding:0.18rem 0.65rem; border-radius:2rem; border:1px solid ${a?'rgba(6,182,212,0.6)':'rgba(45,58,94,0.8)'}; background:${a?'rgba(6,182,212,0.12)':'transparent'}; color:${a?'#06B6D4':'#475569'}; cursor:pointer; font-weight:${a?700:500}; transition:all 0.18s;">${t==='all'?'Todo':typeLabel[t]}</button>`; }).join('')}
                <div style="margin-left:auto; display:flex; align-items:center; gap:0.6rem;">
                    <div style="display:flex; align-items:center; gap:3px; font-size:0.62rem; color:${pinCount>=5?'#F59E0B':'#334155'}; background:${pinCount>=5?'rgba(245,158,11,0.1)':'rgba(15,20,45,0.5)'}; border:1px solid ${pinCount>=5?'rgba(245,158,11,0.3)':'rgba(45,58,94,0.5)'}; border-radius:2rem; padding:0.15rem 0.5rem;">
                        ${IC.pin} ${pinCount}/5
                    </div>
                    <button id="${addBtnId}" class="primary small" style="font-size:0.65rem; padding:0.22rem 0.7rem; background:linear-gradient(105deg,#6D28D9,#8B5CF6); border-radius:2rem; border:none; color:#fff; cursor:pointer;">+ Agregar</button>
                </div>
            </div>`;
        }

        function buildCard(movie, isPinned, canPin, ratingSpanFn, actionsFn, isWishlist=false) {
            const tCols   = typeCols[movie.type||'pelicula'] || typeCols.pelicula;
            const tIcon   = typeIcon[movie.type||'pelicula'];
            const tLabel  = typeLabel[movie.type||'pelicula'];
            const isSeries= movie.type==='serie' || movie.type==='novela';
            const total   = movie.totalEpisodes || 0;
            const watched = movie.watchedEpisodes || 0;
            const pct     = total ? Math.round(watched/total*100) : 0;
            const p1      = movie.ratings?.partner1 ?? null;
            const p2      = movie.ratings?.partner2 ?? null;
            const avg     = (!isWishlist && p1!==null && p2!==null) ? ((p1+p2)/2).toFixed(1) : null;

            const card = document.createElement('div');
            card.className = 'lib-card';
            card.dataset.id = movie.id;
            card.style.cssText = `position:relative; border-radius:1.1rem; overflow:hidden;
                background:linear-gradient(175deg,rgba(10,15,36,0.98) 0%,rgba(16,26,58,0.95) 100%);
                border:1px solid ${isPinned ? tCols.border : 'rgba(30,41,70,0.9)'};
                box-shadow:${isPinned ? `0 0 22px ${tCols.glow}, 0 4px 20px rgba(0,0,0,0.5)` : '0 2px 16px rgba(0,0,0,0.5)'};
                cursor:pointer; transition:border 0.2s, box-shadow 0.2s, transform 0.2s;`;

            card.innerHTML = `
                <div style="position:relative; width:100%; aspect-ratio:2/3; overflow:hidden; background:#080d1e;">
                    ${movie.posterUrl
                        ? `<img src="${movie.posterUrl}" class="lib-poster" style="width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.35s;">`
                        : `<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:rgba(45,58,94,0.7);">${tIcon}</div>`
                    }
                    <!-- gradient overlay always -->
                    <div style="position:absolute; inset:0; background:linear-gradient(180deg, transparent 45%, rgba(8,13,30,0.95) 100%); pointer-events:none;"></div>
                    <!-- hover overlay -->
                    <div class="lib-overlay" style="position:absolute; inset:0; background:rgba(8,13,30,0.88); opacity:0; transition:opacity 0.22s; display:flex; flex-direction:column; justify-content:flex-end; padding:0.6rem; gap:0.28rem;">
                        ${!isWishlist ? `
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-size:0.55rem; color:#475569; text-transform:uppercase; letter-spacing:0.05em;">${currentCouple.namePartner1}</span>
                            ${ratingSpanFn('partner1', p1)}
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-size:0.55rem; color:#475569; text-transform:uppercase; letter-spacing:0.05em;">${currentCouple.namePartner2}</span>
                            ${ratingSpanFn('partner2', p2)}
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center; padding-top:0.1rem; border-top:1px solid rgba(255,255,255,0.05);">
                            ${avg ? `<span style="font-size:0.62rem; color:${tCols.accent}; font-weight:700;">Prom ${avg}</span>` : '<span></span>'}
                            ${movie.tmdbRating ? `<span style="font-size:0.57rem; color:#334155;">TMDB ${movie.tmdbRating.toFixed(1)}</span>` : ''}
                        </div>` : ''}
                        ${isSeries && !isWishlist ? `
                        <div>
                            <div style="height:2px; border-radius:2px; background:rgba(45,58,94,0.5); overflow:hidden; margin-bottom:0.12rem;">
                                <div style="height:100%; width:${pct}%; background:linear-gradient(90deg,${tCols.accent},#06B6D4); border-radius:2px;"></div>
                            </div>
                            <div style="font-size:0.52rem; color:#334155; text-align:right;">${watched}/${total||'?'} ep · ${pct}%</div>
                        </div>` : ''}
                        ${actionsFn(movie)}
                    </div>
                    <!-- type badge -->
                    <div style="position:absolute; top:0.38rem; left:0.38rem; background:rgba(8,13,30,0.82); border:1px solid rgba(255,255,255,0.06); border-radius:0.32rem; padding:0.1rem 0.28rem; font-size:0.5rem; color:#475569; backdrop-filter:blur(4px); display:flex; align-items:center; gap:2px; pointer-events:none;">
                        <span style="display:flex;">${si(tIcon,9,9)}</span>${tLabel}
                    </div>
                    <!-- pin badge + unpin button + unrated badge -->
                    ${isPinned ? `<div class="pin-badge-visible" style="position:absolute; top:0.38rem; right:0.38rem; background:${tCols.accent}; border-radius:0.32rem; padding:0.1rem 0.28rem; display:flex; align-items:center; color:#0B1120; pointer-events:none;">${IC.pin}</div>` : ''}
                    <button class="pin-btn" data-id="${movie.id}" title="${isPinned?'Desanclar':'Anclar'}" style="position:absolute; top:0.38rem; right:0.38rem; background:${isPinned?'rgba(245,158,11,0.88)':'rgba(8,13,30,0.78)'}; border:1px solid ${isPinned?'rgba(245,158,11,0.6)':'rgba(255,255,255,0.1)'}; color:${isPinned?'#0B1120':'#475569'}; border-radius:0.38rem; width:24px; height:24px; display:none; align-items:center; justify-content:center; cursor:${canPin||isPinned?'pointer':'not-allowed'}; backdrop-filter:blur(5px); transition:all 0.18s;">${isPinned ? IC.pinOff : IC.pin}</button>
                    ${!isWishlist && (p1===null || p2===null) ? `<div style="position:absolute; bottom:0.38rem; left:0.38rem; background:rgba(245,158,11,0.15); border:1px solid rgba(245,158,11,0.45); border-radius:0.32rem; padding:0.08rem 0.28rem; font-size:0.48rem; font-weight:700; color:#F59E0B; letter-spacing:0.05em; pointer-events:auto; cursor:pointer; backdrop-filter:blur(4px);" class="sin-calificar-badge">SIN CALIFICAR</div>` : ''}
                </div>
                <!-- card footer -->
                <div style="padding:0.48rem 0.52rem 0.52rem;">
                    <div style="font-size:0.67rem; font-weight:700; color:#E2E8F0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:-0.01em;">${escapeHtml(movie.title)}</div>
                    <div style="font-size:0.55rem; color:#334155; margin-top:0.06rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${movie.year||''} ${movie.genre?'· '+movie.genre:''}</div>
                    ${!isWishlist && movie.viewDate ? `<div style="font-size:0.52rem; color:#475569; margin-top:0.14rem; display:flex; align-items:center; gap:2px;">${IC.cal} ${formatDate(movie.viewDate)}</div>` : ''}
                    ${isWishlist && movie.durationMinutes ? `<div style="font-size:0.52rem; color:#334155; margin-top:0.1rem; display:flex; align-items:center; gap:2px;">${IC.clock} ${movie.durationMinutes} min</div>` : ''}
                    ${isSeries && isWishlist ? `<div style="font-size:0.52rem; color:#334155; margin-top:0.1rem;">${movie.totalEpisodes ? movie.totalEpisodes+' ep' : ''}</div>` : ''}
                </div>
            `;

            const overlay  = card.querySelector('.lib-overlay');
            const poster   = card.querySelector('.lib-poster');
            const pinBtn   = card.querySelector('.pin-btn');
            const pinBadge = card.querySelector('.pin-badge-visible');
            card.addEventListener('mouseenter', () => {
                overlay.style.opacity = '1';
                if (poster) poster.style.transform = 'scale(1.06)';
                if (pinBtn) pinBtn.style.display = 'flex';
                if (pinBadge) pinBadge.style.display = 'none';
                card.style.transform = 'translateY(-2px)';
                card.style.boxShadow = `0 8px 28px rgba(0,0,0,0.6), 0 0 0 1px ${tCols.border}`;
            });
            card.addEventListener('mouseleave', () => {
                overlay.style.opacity = '0';
                if (poster) poster.style.transform = 'scale(1)';
                if (pinBtn) pinBtn.style.display = 'none';
                if (pinBadge) pinBadge.style.display = 'flex';
                card.style.transform = '';
                card.style.boxShadow = isPinned ? `0 0 22px ${tCols.glow}, 0 4px 20px rgba(0,0,0,0.5)` : '0 2px 16px rgba(0,0,0,0.5)';
            });

            return card;
        }


        const pinnedCat = pinnedWishByCategory;
        let sorted = wishlistFilterType === 'all' ? [...wishlist] : wishlist.filter(m=>(m.type||'pelicula')===wishlistFilterType);
        sorted = [...sorted.filter(m=>pinnedCat[wishlistFilterType].has(m.id)), ...sorted.filter(m=>!pinnedCat[wishlistFilterType].has(m.id))];

        panel.innerHTML = buildToolbar(wishlistFilterType, pinnedCat, null, '', 'addWishlistBtn')
            + `<div id="wishlistCardGrid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(162px,1fr)); gap:0.9rem;"></div>`;

        document.getElementById('addWishlistBtn').onclick = () => showAddWishlistModal();
        document.querySelectorAll('.filter-type-btn').forEach(btn => btn.onclick = () => { wishlistFilterType = btn.dataset.type; renderWishlistTab(); });

        const grid = document.getElementById('wishlistCardGrid');
        if (sorted.length === 0) {
            grid.innerHTML = `<p style="color:#334155; font-size:0.78rem; padding:3rem; grid-column:1/-1; text-align:center; letter-spacing:0.04em;">Wishlist vacía${wishlistFilterType!=='all'?' en este filtro':''}.</p>`;
            return;
        }

        const noRating = () => '';
        const actionsFn = (movie) => `
            <button class="move-to-watched" data-id="${movie.id}" style="width:100%; font-size:0.57rem; padding:0.22rem 0; background:rgba(16,185,129,0.15); border:1px solid rgba(16,185,129,0.32); color:#6EE7B7; border-radius:0.45rem; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:3px;">${IC.check} Ya la vimos</button>
            <button class="delete-wishlist" data-id="${movie.id}" style="width:100%; margin-top:0.25rem; font-size:0.57rem; padding:0.2rem 0; background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.28); color:#F87171; border-radius:0.45rem; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:2px;">${IC.trash} Quitar</button>
        `;

        for (const item of sorted) {
            const isPinned = pinnedCat[wishlistFilterType].has(item.id);
            const canPin   = isPinned || pinnedCat[wishlistFilterType].size < 5;
            const card     = buildCard(item, isPinned, canPin, noRating, actionsFn, true);
            card.addEventListener('click', e => { if (!e.target.closest('button')) { /* no summary for wishlist */ } });
            grid.appendChild(card);
        }

        // Pin
        document.querySelectorAll('.pin-btn').forEach(btn => {
            btn.onclick = e => {
                e.stopPropagation();
                const id = btn.dataset.id, cat = wishlistFilterType;
                if (pinnedCat[cat].has(id)) { pinnedCat[cat].delete(id); renderWishlistTab(); }
                else if (pinnedCat[cat].size < 5) { pinnedCat[cat].add(id); renderWishlistTab(); }
                else { showToast('Máximo 5 anclados por categoría.', 'warning'); }
            };
        });

        // Ya la vimos
        document.querySelectorAll('.move-to-watched').forEach(btn => {
            btn.onclick = async e => {
                e.stopPropagation();
                const id = btn.dataset.id;
                const item = wishlist.find(w => w.id === id);
                if (!item) return;
                const newContent = {
                    coupleCode: currentCouple.code, title: item.title, type: item.type||'pelicula',
                    viewDate: new Date().toISOString().slice(0,10), year: item.year||'', genre: item.genre||'',
                    posterUrl: item.posterUrl||'', durationMinutes: item.durationMinutes||0, tmdbRating: item.tmdbRating||null,
                    ratings: {}, completed: {}, comments: {}, likedScale: {}, rewatch: {}, dominantEmotion: {}, entertainment: {}
                };
                if (newContent.type==='serie'||newContent.type==='novela') { newContent.totalEpisodes=0; newContent.watchedEpisodes=0; newContent.seriesCompleted=false; }
                await db.collection('contents').add(newContent);
                Object.values(pinnedWishByCategory).forEach(s=>s.delete(id));
                await db.collection('wishlist').doc(id).delete();
            };
        });

        document.querySelectorAll('.delete-wishlist').forEach(btn => {
            btn.onclick = async e => {
                e.stopPropagation();
                showConfirm('¿Quitar este título de la wishlist?', async () => { Object.values(pinnedWishByCategory).forEach(s=>s.delete(btn.dataset.id)); await db.collection('wishlist').doc(btn.dataset.id).delete(); }, 'Quitar', 'Cancelar', false);
            };
        });
    }

    async function showAddWishlistModal() {
        const modalDiv = document.getElementById('modal');
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3 style="margin-bottom:1rem; color:#06B6D4;">Agregar a wishlist</h3>
                <input type="text" id="searchTitle" placeholder="Buscar por título...">
                <button id="searchTmdbBtn" class="primary" style="width:100%; margin-bottom:0.8rem;">Buscar en TMDB</button>
                <div id="searchResults" class="search-results hidden"></div>
                <div id="manualFields" class="hidden">
                    <hr><h4>Complete manualmente:</h4>
                    <input id="title" placeholder="Título *">
                    <select id="type"><option value="pelicula">Película</option><option value="serie">Serie</option><option value="novela">Novela</option></select>
                    <input type="number" id="year" placeholder="Año">
                    <select id="genre"><option>Acción</option><option>Comedia</option><option>Drama</option><option>Romance</option><option>Terror</option><option>Ciencia ficción</option></select>
                    <input id="posterUrl" placeholder="URL póster">
                    <input type="number" id="duration" placeholder="Duración (min)">
                </div>
                <button id="saveWishlistBtn" class="primary" disabled>Guardar</button>
                <button id="closeModalBtn" class="outline">Cancelar</button>
            </div>
        `;
        modalDiv.classList.remove('hidden');
        let selectedData = null;
        document.getElementById('closeModalBtn').onclick = () => modalDiv.classList.add('hidden');
        document.getElementById('searchTmdbBtn').onclick = async () => {
            const query = document.getElementById('searchTitle').value.trim();
            if (!query) { showToast("Escribe un título para buscar.", "warning"); return; }
            const url = `https://api.themoviedb.org/3/search/multi?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&language=es`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                const resultsDiv = document.getElementById('searchResults');
                resultsDiv.innerHTML = '';
                if (data.results.length === 0) {
                    resultsDiv.innerHTML = '<div class="search-result-item">No encontrado. Usar manual.</div>';
                    document.getElementById('manualFields').classList.remove('hidden');
                    document.getElementById('saveWishlistBtn').disabled = false;
                } else {
                    resultsDiv.classList.remove('hidden');
                    for (let item of data.results.slice(0, 6)) {
                        let detailsUrl = `https://api.themoviedb.org/3/${item.media_type === 'movie' ? 'movie' : 'tv'}/${item.id}?api_key=${TMDB_API_KEY}&language=es`;
                        let detailsRes = await fetch(detailsUrl);
                        let runtime = (await detailsRes.json()).runtime || null;
                        const div = document.createElement('div');
                        div.className = 'search-result-item';
                        div.innerHTML = `<span>${item.title||item.name} ${item.release_date?`(${item.release_date.split('-')[0]})`:''}</span><button style="background:none; border:1px solid #06B6D4;">Seleccionar</button>`;
                        div.onclick = () => {
                            const genreMapTmdb2 = {
                        28:'Acción', 12:'Aventura', 16:'Animación', 35:'Comedia',
                        80:'Crimen', 99:'Documental', 18:'Drama', 14:'Fantasía',
                        27:'Terror', 36:'Historia', 10402:'Música', 9648:'Misterio',
                        10749:'Romance', 878:'Ciencia ficción', 53:'Suspenso',
                        10752:'Bélica', 37:'Western', 10751:'Familia', 10759:'Acción y aventura',
                        10762:'Niños', 10765:'Sci-fi y fantasía', 10766:'Telenovela'
                    };
                            const genreIds2 = item.genre_ids || [];
                            const genreName2 = genreIds2.length ? (genreMapTmdb2[genreIds2[0]] || '') : '';
                            selectedData = {
                                title: item.title||item.name,
                                year: (item.release_date||item.first_air_date||'').split('-')[0],
                                posterUrl: item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : '',
                                type: item.media_type === 'tv' ? 'serie' : 'pelicula',
                                duration: runtime || null,
                                genre: genreName2
                            };
                            document.getElementById('title').value = selectedData.title;
                            document.getElementById('year').value = selectedData.year;
                            document.getElementById('posterUrl').value = selectedData.posterUrl;
                            if (selectedData.type) document.getElementById('type').value = selectedData.type;
                            if (selectedData.duration) document.getElementById('duration').value = selectedData.duration;
                            if (genreName2) {
                                const gs2 = document.getElementById('genre');
                                let found2 = false;
                                for (let opt of gs2.options) { if (opt.value === genreName2 || opt.text === genreName2) { gs2.value = opt.value; found2 = true; break; } }
                                if (!found2) { const o2 = new Option(genreName2, genreName2, true, true); gs2.add(o2, 0); gs2.value = genreName2; }
                            }
                            resultsDiv.classList.add('hidden');
                            document.getElementById('manualFields').classList.remove('hidden');
                            document.getElementById('saveWishlistBtn').disabled = false;
                        };
                        resultsDiv.appendChild(div);
                    }
                }
            } catch(e) { showToast("Error: " + e.message, "error"); document.getElementById('manualFields').classList.remove('hidden'); document.getElementById('saveWishlistBtn').disabled = false; }
        };
        document.getElementById('saveWishlistBtn').onclick = async () => {
            let title = document.getElementById('title')?.value.trim();
            if (!title) title = selectedData?.title;
            if (!title) { showToast("Título requerido.", "error"); return; }
            await db.collection("wishlist").add({
                coupleCode: currentCouple.code, title, type: document.getElementById('type').value,
                year: document.getElementById('year').value, genre: document.getElementById('genre').value || selectedData?.genre || '',
                posterUrl: document.getElementById('posterUrl').value,
                durationMinutes: parseInt(document.getElementById('duration').value) || 0,
                tmdbRating: selectedData?.tmdbRating || null, addedAt: new Date()
            });
            modalDiv.classList.add('hidden');
        };
    }


    // ==================== CAMBIAR CONTRASEÑA ====================
    function showChangePasswordModal() {
        const modalDiv = document.getElementById('modal');
        if (!modalDiv) return;
        modalDiv.innerHTML = `
            <div class="modal-content" style="max-width:420px;">
                <h3 style="margin-bottom:1rem; color:#06B6D4;">🔑 Cambiar contraseña</h3>
                <p style="font-size:0.75rem; color:#94A3B8; margin-bottom:1rem;">La nueva contraseña se usará la próxima vez que inicies sesión.</p>
                <input type="password" id="currentPwd" placeholder="Contraseña actual">
                <input type="password" id="newPwd" placeholder="Nueva contraseña (mínimo 6 caracteres)">
                <input type="password" id="newPwd2" placeholder="Confirmar nueva contraseña">
                <div id="changePwdError" style="color:#F87171; font-size:0.72rem; margin-bottom:0.5rem; display:none;"></div>
                <div class="flex-buttons">
                    <button id="confirmChangePwd" class="primary">Cambiar contraseña</button>
                    <button id="closeChangePwd" class="outline">Cancelar</button>
                </div>
            </div>
        `;
        modalDiv.classList.remove('hidden');
        document.getElementById('closeChangePwd').onclick = () => modalDiv.classList.add('hidden');
        document.getElementById('confirmChangePwd').onclick = async () => {
            const currentPwd = document.getElementById('currentPwd').value;
            const newPwd     = document.getElementById('newPwd').value;
            const newPwd2    = document.getElementById('newPwd2').value;
            const errEl      = document.getElementById('changePwdError');
            errEl.style.display = 'none';
            if (!currentPwd || !newPwd || !newPwd2) { errEl.textContent = 'Completa todos los campos.'; errEl.style.display='block'; return; }
            if (newPwd !== newPwd2) { errEl.textContent = 'Las contraseñas nuevas no coinciden.'; errEl.style.display='block'; return; }
            if (newPwd.length < 6) { errEl.textContent = 'La contraseña debe tener al menos 6 caracteres.'; errEl.style.display='block'; return; }
            try {
                const user = auth.currentUser;
                if (!user) { errEl.textContent = 'Sesión expirada. Vuelve a iniciar sesión.'; errEl.style.display='block'; return; }
                // Re-autenticar con contraseña actual
                const credential = firebase.auth.EmailAuthProvider.credential(user.email, currentPwd);
                await user.reauthenticateWithCredential(credential);
                // Cambiar contraseña
                await user.updatePassword(newPwd);
                modalDiv.classList.add('hidden');
                showToast('Contraseña cambiada exitosamente.', 'success');
            } catch(e) {
                let msg = 'Error al cambiar la contraseña.';
                if (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') msg = 'La contraseña actual es incorrecta.';
                if (e.code === 'auth/weak-password') msg = 'La nueva contraseña es muy débil.';
                if (e.code === 'auth/requires-recent-login') msg = 'Por seguridad, vuelve a iniciar sesión antes de cambiar la contraseña.';
                errEl.textContent = msg; errEl.style.display = 'block';
            }
        };
    }

    function renderUI() {
        if (!currentCouple) {
            const saved = localStorage.getItem('cinepareja_couple');
            if (saved) { try { currentCouple = JSON.parse(saved); } catch(e) { localStorage.removeItem('cinepareja_couple'); } }
        }
        if (!currentCouple) renderAuthScreen();
        else if (!currentPerson) renderProfileSelection();
        else renderMainApp();
    }

    renderUI();
</script>
